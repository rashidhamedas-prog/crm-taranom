plugins {
    id 'com.android.application'
}

android {
    namespace 'ir.taranom.crm'
    compileSdk 34

    defaultConfig {
        applicationId "ir.taranom.crm"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0.0"
    }

    signingConfigs {
        release {
            storeFile file('../crm-taranom.jks')
            storePassword 'CrmTaranom2024!'
            keyAlias 'crm-taranom'
            keyPassword 'CrmTaranom2024!'
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            signingConfig signingConfigs.release
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    implementation 'com.google.androidbrowserhelper:androidbrowserhelper:2.5.0'
}
