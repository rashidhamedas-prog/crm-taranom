<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>CRM ШӘШұЩҶЩ…</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#1A5C38">
<link rel="apple-touch-icon" href="/logo.png">
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
:root{
  --purple:#1A5C38; --purple2:#236B44; --purple-light:#E8F5EE;
  --gold:#C9A843; --gold-light:#FBF5E1;
  --green:#059669; --red:#DC2626; --orange:#D97706; --blue:#2563EB;
  --bg:#f4f7f5; --card:#ffffff; --text:#1f2937; --muted:#6b7280; --border:#e5e7eb;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Vazirmatn',sans-serif}
html,body{height:100%;overflow-x:hidden}
body{background:var(--bg);color:var(--text);font-size:14px;line-height:1.7}
a{color:inherit;text-decoration:none}
button{cursor:pointer;font-family:inherit}
input,select,textarea{font-family:inherit;font-size:14px}
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-thumb{background:#a8c8b4;border-radius:8px}

/* ===== Login ===== */
#login{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,var(--purple),var(--purple2));padding:20px;z-index:1000}
.login-card{background:#fff;border-radius:20px;padding:38px 30px;width:100%;max-width:380px;
  box-shadow:0 20px 60px rgba(0,0,0,.25);text-align:center}
.login-card .logo{font-size:54px;margin-bottom:8px}
.login-card h1{color:var(--purple);font-size:24px;margin-bottom:4px}
.login-card p{color:var(--muted);font-size:13px;margin-bottom:24px}
.login-card .field{text-align:right;margin-bottom:14px}
.login-card label{display:block;font-size:13px;margin-bottom:6px;color:var(--muted)}
.login-card input{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:10px;outline:none}
.login-card input:focus{border-color:var(--purple2)}
.login-card button{width:100%;background:var(--purple);color:#fff;border:none;padding:13px;border-radius:10px;
  font-size:15px;font-weight:600;margin-top:8px}
.login-card button:hover{background:var(--purple2)}
.login-err{color:var(--red);font-size:13px;margin-top:10px;min-height:18px}
.login-hint{margin-top:18px;font-size:11px;color:#9ca3af}

/* ===== Layout ===== */
#app{display:none}
.layout{display:flex;min-height:100vh}
.sidebar{width:240px;background:linear-gradient(180deg,var(--purple),var(--purple2));color:#fff;
  position:fixed;top:0;right:0;bottom:0;display:flex;flex-direction:column;z-index:50;transition:.25s}
.sidebar .brand{padding:22px 20px;display:flex;align-items:center;gap:12px;border-bottom:1px solid rgba(255,255,255,.15)}
.sidebar .brand .emoji{font-size:30px}
.sidebar .brand h2{font-size:18px}
.sidebar .brand small{font-size:11px;opacity:.8;display:block}
.nav{flex:1;overflow-y:auto;padding:12px 0}
.nav a{display:flex;align-items:center;gap:12px;padding:12px 22px;color:rgba(255,255,255,.85);font-size:14px;position:relative}
.nav a .ico{font-size:18px;width:24px;text-align:center}
.nav a:hover{background:rgba(255,255,255,.1);color:#fff}
.nav a.active{background:rgba(255,255,255,.18);color:#fff;font-weight:600}
.nav a.active::before{content:'';position:absolute;right:0;top:0;bottom:0;width:4px;background:#fff}
.nav .badge{position:absolute;left:18px;background:var(--red);color:#fff;font-size:10px;
  min-width:18px;height:18px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 4px}
.sidebar .foot{padding:14px 20px;border-top:1px solid rgba(255,255,255,.15);font-size:12px}
.sidebar .foot button{width:100%;background:rgba(255,255,255,.15);color:#fff;border:none;padding:9px;border-radius:8px;margin-top:8px}
.sidebar .foot button:hover{background:rgba(255,255,255,.28)}

.main{flex:1;margin-right:240px;display:flex;flex-direction:column;min-height:100vh;min-width:0}
.topbar{background:#fff;border-bottom:1px solid var(--border);padding:12px 24px;display:flex;
  align-items:center;justify-content:space-between;position:sticky;top:0;z-index:40}
.topbar .left{display:flex;align-items:center;gap:14px}
.topbar .menu-btn{display:none;background:var(--purple-light);color:var(--purple);border:none;
  width:38px;height:38px;border-radius:10px;font-size:20px}
.topbar h3{font-size:17px;color:var(--purple)}
.topbar .right{display:flex;align-items:center;gap:16px}
.topbar .clock{font-size:13px;color:var(--muted);background:var(--purple-light);padding:6px 12px;border-radius:8px;font-weight:600}
.topbar .user{display:flex;align-items:center;gap:8px;font-size:13px}
.topbar .avatar{width:34px;height:34px;border-radius:50%;background:var(--purple);color:#fff;
  display:flex;align-items:center;justify-content:center;font-weight:700}
.content{padding:22px;flex:1}

/* ===== Cards / Generic ===== */
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;margin-bottom:22px;width:100%}
.stat{background:var(--card);border-radius:14px;padding:18px;box-shadow:0 1px 4px rgba(0,0,0,.05);
  border:1px solid var(--border);display:flex;align-items:center;gap:14px;min-width:0;overflow:hidden}
.stat .ic{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.stat .v{font-size:20px;font-weight:800;white-space:nowrap;overflow:hidden}
.stat .l{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stat > div:last-child{min-width:0;overflow:hidden}
.ic.p{background:var(--purple-light);color:var(--purple)}
.ic.g{background:#d1fae5;color:var(--green)}
.ic.r{background:#fee2e2;color:var(--red)}
.ic.o{background:#fef3c7;color:var(--orange)}
.ic.b{background:#dbeafe;color:var(--blue)}

.panel{background:var(--card);border-radius:14px;border:1px solid var(--border);
  box-shadow:0 1px 4px rgba(0,0,0,.05);margin-bottom:20px;overflow:hidden}
.panel-head{padding:16px 18px;border-bottom:1px solid var(--border);display:flex;
  align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.panel-head h4{font-size:15px;color:var(--purple)}
.panel-body{padding:18px}

.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:16px}
.toolbar input,.toolbar select{padding:9px 12px;border:1.5px solid var(--border);border-radius:9px;outline:none;background:#fff}
.toolbar input:focus,.toolbar select:focus{border-color:var(--purple2)}
.search{flex:1;min-width:180px}

.btn{background:var(--purple);color:#fff;border:none;padding:9px 16px;border-radius:9px;font-size:13px;font-weight:600;display:inline-flex;align-items:center;gap:6px}
.btn:hover{background:var(--purple2)}
.btn.green{background:var(--green)}.btn.red{background:var(--red)}.btn.blue{background:var(--blue)}.btn.orange{background:var(--orange)}
.btn.ghost{background:#fff;color:var(--purple);border:1.5px solid var(--purple)}
.btn.ghost:hover{background:var(--purple-light)}
.btn.sm{padding:6px 10px;font-size:12px}
.btn.icon{padding:6px 9px}

/* ===== Table ===== */
.tbl-wrap{overflow-x:auto}
table.tbl{width:100%;border-collapse:collapse;font-size:13px;min-width:600px}
table.tbl th{background:#f9f7fd;color:var(--purple);text-align:right;padding:11px 12px;font-weight:600;border-bottom:2px solid var(--border);white-space:nowrap}
table.tbl td{padding:10px 12px;border-bottom:1px solid var(--border);white-space:nowrap}
table.tbl tr:hover td{background:#faf8ff}
.empty{text-align:center;color:var(--muted);padding:36px 10px}

.tag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.t-vip{background:#fef3c7;color:#92400e}.t-active{background:#d1fae5;color:#065f46}
.t-followup{background:#dbeafe;color:#1e40af}.t-silent{background:#fee2e2;color:#991b1b}
.t-new{background:var(--purple-light);color:var(--purple)}
.t-pending{background:#fef3c7;color:#92400e}.t-onway{background:#dbeafe;color:#1e40af}
.t-done{background:#d1fae5;color:#065f46}.t-cancel{background:#fee2e2;color:#991b1b}
.t-open{background:#dbeafe;color:#1e40af}
.t-high{background:#fee2e2;color:#991b1b}.t-mid{background:#fef3c7;color:#92400e}.t-low{background:#d1fae5;color:#065f46}
.t-proforma{background:var(--purple-light);color:var(--purple)}.t-final{background:#d1fae5;color:#065f46}

/* ===== Modal ===== */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;
  justify-content:center;z-index:200;padding:16px}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:16px;width:100%;max-width:560px;max-height:92vh;overflow-y:auto;
  box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal.lg{max-width:820px}
.modal-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:2}
.modal-head h3{font-size:17px;color:var(--purple)}
.modal-head .x{background:#f3f4f6;border:none;width:32px;height:32px;border-radius:8px;font-size:18px;color:var(--muted)}
.modal-body{padding:20px}
.modal-foot{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-start;position:sticky;bottom:0;background:#fff}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.fg{display:flex;flex-direction:column;gap:6px}
.fg.full{grid-column:1/-1}
.fg label{font-size:13px;color:var(--muted)}
.fg input,.fg select,.fg textarea{padding:10px 12px;border:1.5px solid var(--border);border-radius:9px;outline:none;background:#fff}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--purple2)}
.fg textarea{resize:vertical;min-height:70px}
.fg input[readonly]{background:#f3f4f6;color:var(--muted)}

/* ===== Jalali datepicker (minimal) ===== */
.dp-overlay{position:fixed;inset:0;z-index:599;display:none}
.dp-overlay.open{display:block}
.dp{position:fixed;background:#fff;border-radius:10px;box-shadow:0 4px 20px rgba(0,0,0,.16);border:1px solid var(--border);width:224px;z-index:600;display:none;padding:10px}
.dp.open{display:block;animation:dpPop .12s ease}
@keyframes dpPop{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
/* Nav row */
.dp-nav{display:flex;align-items:center;gap:4px;margin-bottom:8px}
.dp-nav button{background:none;color:var(--text);border:1px solid var(--border);width:24px;height:24px;border-radius:5px;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.1s;flex-shrink:0;padding:0}
.dp-nav button:hover{background:var(--purple-light);border-color:var(--purple);color:var(--purple)}
.dp-nav select{flex:1;background:#fff;color:var(--text);border:1px solid var(--border);border-radius:5px;padding:2px 4px;font-size:11px;font-family:inherit;cursor:pointer;outline:none;direction:rtl;text-align:center;height:24px}
.dp-nav .dp-month-lbl{flex:1;text-align:center;font-size:12px;font-weight:700;color:var(--text)}
/* Weekday headers */
.dp-week{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:3px}
.dp-week span{text-align:center;font-size:9px;font-weight:700;color:var(--muted);padding:2px 0}
/* Day squares */
.dp-days{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.dp-days button{width:100%;aspect-ratio:1;border:1px solid transparent;background:transparent;border-radius:4px;font-size:11px;color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .08s,color .08s;position:relative;font-family:inherit;padding:0}
.dp-days button:hover:not(.empty):not(.sel){background:var(--purple-light);color:var(--purple);border-color:var(--purple)}
.dp-days button.today{font-weight:800;color:var(--purple);border-color:var(--purple)}
.dp-days button.sel{background:var(--purple)!important;color:#fff!important;font-weight:700;border-color:var(--purple)!important}
.dp-days button.empty{visibility:hidden;cursor:default;pointer-events:none}
/* Footer */
.dp-foot{display:flex;gap:5px;margin-top:8px;padding-top:7px;border-top:1px solid var(--border)}
.dp-foot button{flex:1;font-size:11px;padding:4px 0;border:1px solid var(--border);border-radius:5px;cursor:pointer;font-family:inherit;font-weight:600;background:#fff;color:var(--text);transition:.1s}
.dp-foot .today-btn:hover{background:var(--purple);color:#fff;border-color:var(--purple)}
.dp-foot .clear-btn:hover{background:#f3f4f6}
@media(max-width:480px){
  .dp{width:calc(100vw - 24px);left:12px!important;right:12px!important;bottom:12px!important;top:auto!important;border-radius:10px;animation:dpSlideUp .15s ease}
  @keyframes dpSlideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
  .dp-days button{font-size:13px}
}

/* ===== Product grid ===== */
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px}
.pcard{background:#fff;border:1px solid var(--border);border-radius:14px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.05);transition:.15s;position:relative}
.pcard:hover{box-shadow:0 6px 18px rgba(107,33,168,.15);transform:translateY(-2px)}
.pcard .img{aspect-ratio:1;background:var(--purple-light);display:flex;align-items:center;justify-content:center;font-size:42px;overflow:hidden}
.pcard .img img{width:100%;height:100%;object-fit:cover;object-position:center}
.pcard .body{padding:12px}
.pcard .name{font-weight:600;font-size:14px;margin-bottom:4px}
.pcard .code{font-size:11px;color:var(--muted);margin-bottom:8px}
.pcard .price{color:var(--green);font-weight:700;font-size:15px}
.pcard .stock{font-size:12px;margin-top:6px}
.pcard .stock.low{color:var(--red);font-weight:600}
.pcard .acts{display:flex;gap:6px;margin-top:10px}
.pcard .acts button{flex:1;font-size:12px;padding:6px;border:none;border-radius:7px}

/* ===== Invoice builder ===== */
.inv-layout{display:grid;grid-template-columns:1fr 380px;gap:18px}
.inv-products{max-height:560px;overflow-y:auto}
.inv-pick{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px}
.pick-card{border:1px solid var(--border);border-radius:10px;padding:8px;cursor:pointer;text-align:center;background:#fff}
.pick-card:hover{border-color:var(--purple2);background:var(--purple-light)}
.pick-card .pimg{aspect-ratio:1;background:var(--purple-light);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:30px;overflow:hidden;margin-bottom:6px}
.pick-card .pimg img{width:100%;height:100%;object-fit:cover;object-position:center}
.pick-card .pn{font-size:12px;font-weight:600;min-height:32px}
.pick-card .pp{font-size:12px;color:var(--green);font-weight:700}
.inv-cart{background:#fff;border:1px solid var(--border);border-radius:12px;padding:14px;position:sticky;top:80px;align-self:start}
.cart-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px dashed var(--border);font-size:13px}
.cart-row .cn{flex:1}
.cart-row input{width:54px;padding:5px;text-align:center;border:1px solid var(--border);border-radius:6px}
.cart-row .price-in{width:84px}
.cart-row .rm{background:#fee2e2;color:var(--red);border:none;width:26px;height:26px;border-radius:6px}
.cart-tot{margin-top:12px;font-size:13px}
.cart-tot .l{display:flex;justify-content:space-between;padding:5px 0}
.cart-tot .final{font-weight:800;font-size:16px;color:var(--green);border-top:1px solid var(--border);padding-top:8px;margin-top:4px}

/* ===== Messages ===== */
.msg-tabs{display:flex;gap:8px;margin-bottom:14px}
.msg-tabs button{padding:8px 16px;border:none;border-radius:9px;background:#f3f4f6;color:var(--muted);font-weight:600}
.msg-tabs button.active{background:var(--purple);color:#fff}
.msg{background:#fff;border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:10px}
.msg.unread{border-right:4px solid var(--purple);background:#faf8ff}
.msg .mh{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:6px}
.msg .mb{font-size:14px}

/* ===== Toast ===== */
#toasts{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:900;display:flex;flex-direction:column;gap:8px;align-items:center}
.toast{background:#1f2937;color:#fff;padding:12px 22px;border-radius:10px;font-size:14px;box-shadow:0 6px 20px rgba(0,0,0,.25);animation:slideup .25s}
.toast.success{background:var(--green)}.toast.error{background:var(--red)}.toast.info{background:var(--blue)}
@keyframes slideup{from{opacity:0;transform:translateY(20px)}to{opacity:1}}

.muted{color:var(--muted)}
.right{text-align:right}.center{text-align:center}.left{text-align:left}
.mono{font-variant-numeric:tabular-nums}
.flex{display:flex}.gap{gap:10px}.wrap{flex-wrap:wrap}
.hide{display:none!important}

/* ===== Searchable Customer Select ===== */
.cust-sw{position:relative}
.cust-si{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:9px;outline:none;background:#fff;font-family:inherit;font-size:14px;color:var(--text)}
.cust-si:focus{border-color:var(--purple2);box-shadow:0 0 0 3px rgba(35,107,68,.08)}
.cust-si-drop{background:#fff;border:1.5px solid var(--border);border-radius:10px;box-shadow:0 8px 28px rgba(0,0,0,.16);overflow-y:auto;z-index:2000;direction:rtl}
.cust-si-item{padding:9px 12px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;gap:8px}
.cust-si-item:last-child{border-bottom:none}
.cust-si-item:hover{background:var(--purple-light);color:var(--purple)}
.cust-si-meta{font-size:11px;color:var(--muted);white-space:nowrap}
.cust-si-empty{padding:14px;text-align:center;color:var(--muted);font-size:12px}

/* ===== Contextual help tooltip ===== */
.hlp{display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:50%;background:var(--purple-light);color:var(--purple);font-size:9px;font-weight:800;cursor:help;margin-right:4px;vertical-align:middle;position:relative;user-select:none;flex-shrink:0;line-height:1}
.hlp::before{content:attr(data-tip);position:absolute;bottom:calc(100% + 8px);right:-8px;background:#1e293b;color:#f1f5f9;padding:9px 13px;border-radius:11px;font-size:12px;width:240px;white-space:normal;line-height:1.65;z-index:10000;display:none;text-align:right;direction:rtl;font-weight:400;box-shadow:0 8px 24px rgba(0,0,0,.25);pointer-events:none}
.hlp::after{content:'';position:absolute;bottom:calc(100% + 3px);right:4px;border:5px solid transparent;border-top-color:#1e293b;display:none;pointer-events:none}
.hlp:hover::before,.hlp:hover::after{display:block}
@media(max-width:600px){.hlp::before{width:200px;right:auto;left:-8px}}

/* ===== Help Page ===== */
.help-tabs{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
.help-tabs button{padding:9px 18px;border:none;border-radius:10px;background:#f3f4f6;color:var(--muted);font-weight:600;cursor:pointer;font-family:inherit;font-size:14px}
.help-tabs button.active{background:var(--purple);color:#fff}
.help-section{background:#fff;border:1px solid var(--border);border-radius:14px;margin-bottom:12px;overflow:hidden}
.help-section .hs-head{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer;font-weight:700;font-size:15px;user-select:none}
.help-section .hs-head:hover{background:var(--purple-light)}
.help-section .hs-head .hs-icon{font-size:20px;margin-left:10px}
.help-section .hs-body{padding:0 16px 16px;font-size:14px;line-height:1.9;color:#374151;display:none}
.help-section.open .hs-body{display:block}
.help-section .hs-body h5{color:var(--purple);margin:14px 0 6px;font-size:14px}
.help-section .hs-body ul{padding-right:18px;margin:6px 0}
.help-section .hs-body ul li{margin-bottom:4px}
.help-section .hs-body .tip{background:#f0fdf4;border-right:3px solid var(--green);padding:10px 14px;border-radius:8px;margin:10px 0;font-size:13px}
.help-section .hs-body .warn{background:#fffbeb;border-right:3px solid #f59e0b;padding:10px 14px;border-radius:8px;margin:10px 0;font-size:13px}

/* ===== API Page ===== */
.api-key-row{display:flex;align-items:center;gap:10px;padding:12px;background:#fff;border:1px solid var(--border);border-radius:10px;margin-bottom:8px}
.api-key-row .key-name{font-weight:700;flex:1}
.api-key-row .key-prefix{font-family:monospace;font-size:12px;color:var(--muted);background:#f3f4f6;padding:3px 8px;border-radius:6px}
.api-key-row .key-scope{font-size:12px;color:var(--blue);background:#eff6ff;padding:3px 8px;border-radius:6px}
.api-reveal{font-family:monospace;font-size:13px;background:#1f2937;color:#86efac;padding:14px;border-radius:10px;word-break:break-all;margin:12px 0;direction:ltr;text-align:left}
.webhook-row{display:flex;align-items:center;gap:10px;padding:12px;background:#fff;border:1px solid var(--border);border-radius:10px;margin-bottom:8px}
.usage-tbl{font-size:12px;width:100%}
.usage-tbl td,.usage-tbl th{padding:6px 8px;border-bottom:1px solid var(--border)}
.usage-tbl th{color:var(--muted);font-weight:600}

/* Role tags */
.t-inside{background:#ede9fe;color:#5b21b6}
.t-field{background:#e0f2fe;color:#0c4a6e}

/* ===== Pipeline Kanban Board ===== */
.pipeline-board{display:flex;gap:12px;overflow-x:auto;padding-bottom:16px;align-items:flex-start;width:100%;-webkit-overflow-scrolling:touch;scroll-snap-type:x proximity}
.pipeline-col{flex:0 0 210px;background:#f4f7f5;border-radius:12px;padding:10px;min-height:160px;scroll-snap-align:start;min-width:0}
.pipeline-col .col-head{display:flex;align-items:center;justify-content:space-between;font-size:13px;font-weight:700;color:var(--purple);padding-bottom:8px;margin-bottom:8px;border-bottom:2px solid var(--border)}
.pipeline-col .col-head .cnt{background:var(--purple);color:#fff;border-radius:10px;min-width:20px;height:20px;display:inline-flex;align-items:center;justify-content:center;font-size:11px;padding:0 5px}
.f-card{background:#fff;border-radius:10px;padding:11px;margin-bottom:8px;border:1px solid var(--border);box-shadow:0 1px 3px rgba(0,0,0,.05);cursor:pointer;transition:.15s;min-width:0;overflow:hidden}
.f-card:hover{border-color:var(--purple2);box-shadow:0 4px 12px rgba(26,92,56,.12)}
.f-card .fc-cust{font-weight:700;font-size:13px;margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.f-card .fc-sub{font-size:12px;color:var(--muted);margin-bottom:5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.f-card .fc-meta{display:flex;gap:4px;flex-wrap:wrap}
.f-card .fc-date{font-size:11px;color:var(--muted);margin-top:5px}
.prob-bar{height:4px;border-radius:4px;background:var(--border);overflow:hidden;min-width:50px;flex:1}
.prob-bar .fill{height:100%;border-radius:4px;background:var(--green)}
.interest-dot{display:inline-block;width:9px;height:9px;border-radius:50%;vertical-align:middle}
.int-very_low{background:#9ca3af}.int-low{background:#f59e0b}.int-mid{background:#3b82f6}.int-high{background:#10b981}.int-very_high{background:#7c3aed}

/* Pipeline stage tag colors */
.t-lead{background:#ede9fe;color:#5b21b6}
.t-contact{background:#dbeafe;color:#1e40af}
.t-proposal{background:#fef3c7;color:#92400e}
.t-negotiation{background:#fee2e2;color:#991b1b}
.t-won{background:#d1fae5;color:#065f46}
.t-lost{background:#f3f4f6;color:#6b7280}

/* ===== Activity Timeline ===== */
.timeline{list-style:none;padding:0;position:relative}
.timeline::before{content:'';position:absolute;right:15px;top:0;bottom:0;width:2px;background:var(--border)}
.timeline-item{display:flex;gap:12px;padding-bottom:18px;position:relative}
.timeline-dot{width:30px;height:30px;border-radius:50%;background:var(--purple-light);color:var(--purple);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px;z-index:1;border:2px solid #fff;box-shadow:0 0 0 2px var(--purple-light)}
.timeline-body{flex:1;background:#fff;border:1px solid var(--border);border-radius:10px;padding:12px}
.tm-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.tm-type{font-weight:700;font-size:13px;color:var(--purple)}
.tm-date{font-size:11px;color:var(--muted)}
.tm-text{font-size:13px;color:var(--text);line-height:1.6}
.tm-meta{display:flex;gap:5px;flex-wrap:wrap}

/* ===== Followup Modal Sections ===== */
.fup-section{margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.fup-section:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.fup-section-title{font-size:11px;font-weight:700;color:var(--purple);letter-spacing:.5px;margin-bottom:10px;padding:4px 8px;background:var(--purple-light);border-radius:5px;display:inline-block}

/* ===== Mobile sidebar backdrop ===== */
#sidebarBackdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:49}
#sidebarBackdrop.show{display:block}

/* ===== Responsive ===== */
@media(max-width:900px){
  .sidebar{transform:translateX(110%);transition:transform .28s cubic-bezier(.4,0,.2,1);will-change:transform}
  .sidebar.open{transform:translateX(0)}
  .main{margin-right:0!important;width:100%}
  .topbar .menu-btn{display:flex;align-items:center;justify-content:center}
  .inv-layout{grid-template-columns:1fr}
  .inv-cart{position:static}
  .form-grid{grid-template-columns:1fr 1fr}
  .topbar .clock{display:none}
  .tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;width:100%}
  .cards{grid-template-columns:repeat(2,1fr);gap:12px}
  .stat{padding:14px 10px;gap:10px}
  .stat .ic{width:40px;height:40px;font-size:20px}
  .stat .v{font-size:16px}
  .stat .l{font-size:11px}
  .content{padding:16px}
  .view{width:100%}
  .pipeline-col{flex:0 0 190px}
}
@media(max-width:600px){
  .cards{grid-template-columns:1fr 1fr;gap:8px;width:100%}
  .stat{padding:12px 8px;gap:8px}
  .stat .ic{width:34px;height:34px;font-size:17px}
  .stat .v{font-size:13px}
  .stat .l{font-size:10px}
  .pgrid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr))}
  .overlay{align-items:flex-end;padding:0}
  .modal{max-height:96vh;border-radius:16px 16px 0 0;width:100%}
  .modal.lg{max-width:100%;border-radius:16px 16px 0 0}
  .inv-layout{grid-template-columns:1fr}
  table.tbl{font-size:12px}
  table.tbl th,table.tbl td{padding:8px 6px}
  .sidebar{width:280px;transform:translateX(110%)}
  .pipeline-col{flex:0 0 168px}
  .pipeline-board{gap:8px}
  .content{padding:10px;width:100%}
  .dp{max-width:calc(100vw - 24px)}
  .topbar{padding:8px 12px}
  .topbar h3{font-size:14px}
  .toolbar{gap:6px;flex-wrap:wrap;width:100%}
  .toolbar input,.toolbar select{font-size:13px;padding:8px 10px;min-width:0;flex:1}
  .btn{padding:8px 12px;font-size:12px}
  .btn.sm{padding:6px 8px;font-size:11px}
  .panel-head{padding:12px 14px;flex-direction:column;align-items:flex-start;gap:8px}
  .panel-body{padding:10px}
  .modal-body{padding:12px}
  .form-grid{grid-template-columns:1fr}
  .inv-pick{grid-template-columns:repeat(auto-fill,minmax(110px,1fr))}
  .topbar .user span:last-child{display:none}
  .tbl-wrap table{min-width:500px}
}
@media(max-width:400px){
  .cards{grid-template-columns:1fr}
  .stat{padding:14px 12px;gap:12px}
  .stat .ic{width:40px;height:40px;font-size:20px}
  .stat .v{font-size:16px}
  .stat .l{font-size:11px}
}
@media print{
  .sidebar,.topbar,.btn,.toolbar,.panel-head{display:none!important}
  .main{margin:0}.content{padding:0}
  body{background:#fff}
}

/* ===== Image lightbox preview ===== */
.img-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;
  justify-content:center;z-index:1000;cursor:zoom-out}

async function api(method, path, data, isFormData){
  const opts = { method, headers:{} };
  const token = localStorage.getItem('crm_token');
  if(token) opts.headers['Authorization'] = 'Bearer ' + token;
  if(data && !isFormData){ opts.headers['Content-Type']='application/json'; opts.body=JSON.stringify(data); }
  else if(isFormData) opts.body = data;
  let r;
  try { r = await fetch('/api'+path, opts); }
  catch(e){ showToast('Ш®Ш·Ш§ЫҢ Ш§ШұШӘШЁШ§Ш· ШЁШ§ ШіШұЩҲШұ','error'); throw e; }
  if(r.status === 401){ logout(); return null; }
  const ct = r.headers.get('content-type')||'';
  if(ct.includes('application/json')){
    const j = await r.json();
    if(!r.ok){ showToast(j.error || 'Ш®Ш·Ш§ ШұШ® ШҜШ§ШҜ','error'); throw new Error(j.error||'error'); }
    return j;
  }
  if(!r.ok){ showToast('Ш®Ш·Ш§ ШұШ® ШҜШ§ШҜ','error'); throw new Error('error'); }
  return r;
}

/* ============================================================
   JALALI DATE CONVERSION
============================================================ */
function _g2j(gy,gm,gd){
  var g2=[0,31,59,90,120,151,181,212,243,273,304,334];
  var gy2=(gm>2)?(gy+1):gy;
  var days=355666+(365*gy)+Math.floor((gy2+3)/4)-Math.floor((gy2+99)/100)+Math.floor((gy2+399)/400)+gd+g2[gm-1];
  var jy=-1595+(33*Math.floor(days/12053));
  days%=12053; jy+=4*Math.floor(days/1461); days%=1461;
  if(days>365){jy+=Math.floor((days-1)/365);days=(days-1)%365;}
  var jm,jd;
  if(days<186){jm=1+Math.floor(days/31);jd=1+(days%31);}
  else{jm=7+Math.floor((days-186)/30);jd=1+((days-186)%30);}
  return[jy,jm,jd];
}
function _jIsLeap(y){return((((y-474)%2820)+474+38)*682)%2816<682;}
function _jDIM(m,y){return m<=6?31:m<=11?30:_jIsLeap(y)?30:29;}
function _j2g(jy,jm,jd){
  jy+=1595;
  var days=-355668+(365*jy)+(Math.floor(jy/33)*8)+Math.floor(((jy%33)+3)/4)+jd+((jm<7)?(jm-1)*31:((jm-7)*30+186));
  var gy=400*Math.floor(days/146097); days%=146097;
  if(days>36524){gy+=100*Math.floor(--days/36524);days%=36524;if(days>=365)days++;}
  gy+=4*Math.floor(days/1461); days%=1461;
  if(days>365){gy+=Math.floor((days-1)/365);days=(days-1)%365;}
  var gd=days+1;
  var sal=[0,31,((gy%4===0&&gy%100!==0)||(gy%400===0))?29:28,31,30,31,30,31,31,30,31,30,31];
  var gm;for(gm=0;gm<13&&gd>sal[gm];gm++)gd-=sal[gm];
  return[gy,gm,gd];
}

let _srvOffset = 0; // ms offset between server clock and client clock
function _serverNow(){ return new Date(Date.now() + _srvOffset); }
function todayJalali(){
  const d=_serverNow();
  const ds=d.toLocaleDateString('en-CA',{timeZone:'Asia/Tehran'});
  const [gy,gm,gdd]=ds.split('-').map(Number);
  const [y,m,dd]=_g2j(gy,gm,gdd);
  return y+'/'+String(m).padStart(2,'0')+'/'+String(dd).padStart(2,'0');
}
async function syncServerTime(){
  try{
    const t0=Date.now();
    const r=await fetch('/api/system/time'); if(!r.ok) return;
    const j=await r.json(); const rtt=Date.now()-t0;
    if(j.ts) _srvOffset=(j.ts+rtt/2)-Date.now();
  }catch(e){}
}

function initCustSearches(scope){
  (scope||document).querySelectorAll('.cust-sw').forEach(sw=>{
    const id=sw.dataset.csId;
    const inp=el(id+'-input');
    if(!inp||inp.dataset.csBound) return;
    inp.dataset.csBound='1';
    inp.addEventListener('focus',()=>showCustDrop(id,''));
    inp.addEventListener('input',()=>showCustDrop(id,inp.value));
    inp.addEventListener('keydown',e=>{
      if(e.key==='Escape'){hideCustDrop(id);}
    });
  });
}
function showCustDrop(id, q){
  const drop=el(id+'-drop'); if(!drop) return;
  const inp=el(id+'-input'); if(!inp) return;
  const optional=el(id)?.dataset?.optional==='1';
  const term=(q||'').trim().toLowerCase();
  let list=CACHE.customers;
  if(term){
    const words=term.split(/\s+/);
    list=list.filter(c=>{
      const hay=((c.biz||'')+' '+(c.phone||'')+' '+(c.owner||'')).toLowerCase();
      return words.every(w=>hay.includes(w));
    });
  }
  const rect=inp.getBoundingClientRect();
  drop.style.top=(rect.bottom+2)+'px';
  drop.style.left=rect.left+'px';
  drop.style.width=rect.width+'px';
  drop.style.display='block';
  let html='';
  if(optional) html+=`<div class="cust-si-item" onclick="pickCust('${id}',0)"><span>ШЁШҜЩҲЩҶ Щ…ШҙШӘШұЫҢ</span></div>`;
  html+=list.slice(0,40).map(c=>`
    <div class="cust-si-item" onclick="pickCust('${id}',${c.id})">
      <span>${esc(c.biz)}</span>
      <span class="cust-si-meta">${esc(c.phone||'')}</span>
    </div>`).join('');
  if(!html) html='<div class="cust-si-empty">Щ…ШҙШӘШұЫҢ ЫҢШ§ЩҒШӘ ЩҶШҙШҜ</div>';
  drop.innerHTML=html;
}
function pickCust(id, custId){
  const h=el(id); if(h) h.value=custId||'';
  const inp=el(id+'-input');
  if(inp){
    if(custId){
      const c=CACHE.customers.find(x=>x.id===+custId);
      inp.value=c?c.biz:'';
    } else { inp.value=''; }
  }
  hideCustDrop(id);
}
function hideCustDrop(id){
  const drop=el(id+'-drop'); if(drop) drop.style.display='none';
}

let DP = { input:null, y:0, m:0, sel:null };
function attachDatepickers(scope){
  (scope||document).querySelectorAll('input[data-jdate]').forEach(inp=>{
    if(inp.dataset.dpBound) return;
    inp.dataset.dpBound='1';
    inp.readOnly = true;
    inp.style.cursor='pointer';
    inp.addEventListener('click', (e)=>{ e.stopPropagation(); openDP(inp); });
    inp.addEventListener('keydown', (e)=>{ if(e.key==='Enter'||e.key===' ') openDP(inp); });
  });
}
function openDP(inp){
  DP.input = inp;
  const today = todayJalali().split('/');
  const parts = (inp.value||'').split('/').map(x=>parseInt(x));
  if(parts.length===3 && parts[0]>=1300 && parts[0]<=1500 && parts[1]>=1 && parts[1]<=12){
    DP.y=parts[0]; DP.m=parts[1]; DP.sel=inp.value;
  } else {
    DP.y=+today[0]; DP.m=+today[1]; DP.sel=null;
  }
  DP.y=Math.max(1300,Math.min(1500,DP.y));
  DP.m=Math.max(1,Math.min(12,DP.m));
  el('dpOverlay').classList.add('open');
  renderDP();
  positionDP(inp);
}
function closeDP(){
  const dp=el('dpRoot').querySelector('.dp');
  if(dp) dp.classList.remove('open');
  el('dpOverlay').classList.remove('open');
  DP.input=null;
}
function renderDP(){
  const firstG = _j2g(DP.y, DP.m, 1);
  const fd = new Date(firstG[0], firstG[1]-1, firstG[2]);
  const startW = (fd.getDay()+1)%7; // Jalali week: Sat=0
  const dim = _jDIM(DP.m, DP.y);
  const tj = todayJalali();
  let cells='';
  for(let i=0;i<startW;i++) cells+='<button class="empty" aria-hidden="true"></button>';
  for(let d=1;d<=dim;d++){
    const val = DP.y+'/'+String(DP.m).padStart(2,'0')+'/'+String(d).padStart(2,'0');
    let cls=''; if(val===tj) cls+=' today'; if(val===DP.sel) cls+=' sel';
    cells+=`<button class="${cls.trim()}" onclick="pickDay(${d})" aria-label="${J_MONTHS[DP.m-1]} ${d}">${toFa(d)}</button>`;
  }
  const yearOpts = [];
  for(let y=1380;y<=1425;y++) yearOpts.push(`<option value="${y}" ${y===DP.y?'selected':''}>${toFa(y)}</option>`);
  el('dpRoot').innerHTML = `<div class="dp open" onclick="event.stopPropagation()">
    <div class="dp-nav">
      <button onclick="dpNav(-1)" title="Щ…Ш§ЩҮ ЩӮШЁЩ„">вҖ№</button>
      <span class="dp-month-lbl">${J_MONTHS[DP.m-1]}</span>
      <select onchange="DP.y=parseInt(this.value);renderDP()" title="Ш§ЩҶШӘШ®Ш§ШЁ ШіШ§Щ„">${yearOpts.join('')}</select>
      <button onclick="dpNav(1)" title="Щ…Ш§ЩҮ ШЁШ№ШҜ">вҖә</button>
    </div>
    <div class="dp-week">${J_WEEK.map(w=>`<span>${w}</span>`).join('')}</div>
    <div class="dp-days">${cells}</div>
    <div class="dp-foot">
      <button class="today-btn" onclick="pickToday()">Ш§Щ…ШұЩҲШІ</button>
      <button class="clear-btn" onclick="pickClear()">ЩҫШ§Ъ©</button>
    </div>
  </div>`;
  positionDP(DP.input);
}
function positionDP(inp){
  const dp=el('dpRoot').querySelector('.dp'); if(!dp) return;
  if(window.innerWidth<=480){ dp.style.cssText=''; return; }
  if(!inp){ dp.style.right='50%'; dp.style.top='50%'; return; }
  const r=inp.getBoundingClientRect();
  const dpW=224, dpH=dp.offsetHeight||260;
  let right=Math.max(8, window.innerWidth-r.right);
  if(right+dpW>window.innerWidth-8) right=Math.max(8, window.innerWidth-dpW-8);
  let top = (r.bottom+dpH+6>window.innerHeight && r.top-dpH-6>0) ? r.top-dpH-6 : r.bottom+4;
  if(top<8) top=8;
  dp.style.right=right+'px'; dp.style.top=top+'px'; dp.style.left='auto'; dp.style.bottom='auto';
}
function dpNav(dir){
  DP.m+=dir;
  if(DP.m>12){DP.m=1;DP.y=Math.min(1420,DP.y+1);}
  if(DP.m<1){DP.m=12;DP.y=Math.max(1390,DP.y-1);}
  renderDP();
}
function pickDay(d){
  const val = DP.y+'/'+String(DP.m).padStart(2,'0')+'/'+String(d).padStart(2,'0');
  if(DP.input){ DP.input.value=val; DP.input.dispatchEvent(new Event('change')); }
  closeDP();
}
function pickToday(){ if(DP.input){ DP.input.value=todayJalali(); DP.input.dispatchEvent(new Event('change')); } closeDP(); }
function pickClear(){ if(DP.input){ DP.input.value=''; DP.input.dispatchEvent(new Event('change')); } closeDP(); }

el('loginForm').addEventListener('submit', async (e)=>{

async function boot(){
  el('login').style.display='none';
  el('app').style.display='block';
  ME = JSON.parse(localStorage.getItem('crm_user')||'null');
  syncServerTime(); // refresh offset after login (non-blocking)
  el('userName').textContent = ME.name;
  el('userRole').textContent = roleLabel(ME.role);
  el('brandRole').textContent = isAdmin()?'ЩҫЩҶЩ„ Щ…ШҜЫҢШұЫҢШӘ':'ЩҫЩҶЩ„ ЩҒШұЩҲШҙ';

  el('footUser').textContent = ME.name + ' В· @' + ME.username;
  buildNav();
  await loadInitial();
  go('dash');
  refreshMsgBadge();
  refreshRemBadge();
  setInterval(refreshMsgBadge, 30000);
  setInterval(refreshRemBadge, 60000);
}

async function loadInitial(){
  try{
    const [customers, products] = await Promise.all([
      api('GET','/customers'),
      api('GET','/products')
    ]);
    CACHE.customers = customers||[];
    CACHE.products = products||[];

    CACHE.reminders = [];
    if(ME.role==='admin'){
      CACHE.users = await api('GET','/auth/users') || [];

    } else {
      CACHE.users = [];
    }

}

function statCard(c,ic,v,l){ return `<div class="stat"><div class="ic ${c}">${ic}</div><div><div class="v mono">${v}</div><div class="l">${l}</div></div></div>`; }
function fitStatNums(){
  requestAnimationFrame(()=>{
    document.querySelectorAll('.stat .v').forEach(el=>{
      el.style.fontSize='';
      let fs=parseInt(getComputedStyle(el).fontSize)||20;
      // shrink until text fits inside its own box (scrollWidth = real text width; clientWidth = visible box width)
      while(el.scrollWidth>el.clientWidth+1&&fs>11){fs--;el.style.fontSize=fs+'px';}
    });
  });
}

function renderCustTable(){

  if(custFilter.user_id) rows=rows.filter(c=>String(c.user_id)===String(custFilter.user_id)||String(c.assigned_to)===String(custFilter.user_id));
  const isAdmin = ME.role==='admin';
  const bar = el('cBulkBar');
  const cnt = el('cSelCount');
  if(bar) bar.style.display = custSelected.size>0 ? 'flex' : 'none';
  if(cnt) cnt.textContent = `${custSelected.size} Щ…ЩҲШұШҜ Ш§ЩҶШӘШ®Ш§ШЁ ШҙШҜЩҮ`;
  const allIds = rows.map(r=>r.id);
  const allChecked = allIds.length>0 && allIds.every(id=>custSelected.has(id));
  el('custTable').innerHTML = `<table class="tbl"><thead><tr>
    <th style="width:36px"><input type="checkbox" ${allChecked?'checked':''} onchange="toggleAllCust(this,${JSON.stringify(allIds)})"></th>

  </tr></thead><tbody>${rows.map(c=>`<tr ${custSelected.has(c.id)?'style="background:var(--purple-light)"':''}>

    <td style="white-space:nowrap">
      <button class="btn sm ghost" onclick="custModal(${c.id})">вңҸпёҸ</button>
      <button class="btn sm blue icon" onclick="custActivityModal(${c.id})" title="ШӘШ§ШұЫҢШ®ЪҶЩҮ ЩҫЫҢЪҜЫҢШұЫҢ">рҹ“Ӣ</button>
      ${c.phone?`<button class="btn sm ghost" onclick="sendWelcomeSMS(${c.id})" title="Ш§ШұШіШ§Щ„ ЩҫЫҢШ§Щ…Ъ© Ш®ЩҲШҙвҖҢШўЩ…ШҜЪҜЩҲЫҢЫҢ">рҹ“Ө</button>`:''}
      <button class="btn sm red" onclick="confirmDelete('customers',${c.id},'${esc(c.biz)}')">рҹ—‘пёҸ</button></td>
  </tr>`).join('')||emptyRow(isAdmin?10:8)}</tbody></table>`;

function toggleCust(id, checked){ if(checked) custSelected.add(id); else custSelected.delete(id); renderCustTable(); }
function toggleAllCust(cb, ids){ ids.forEach(id=>cb.checked?custSelected.add(id):custSelected.delete(id)); renderCustTable(); }
async function bulkCustStatus(status){
  if(!custSelected.size) return;
  if(!confirm(`ЩҲШ¶Ш№ЫҢШӘ ${custSelected.size} Щ…ШҙШӘШұЫҢ ШЁЩҮ "${STATUS_LABEL[status]||status}" ШӘШәЫҢЫҢШұ Ъ©ЩҶШҜШҹ`)) return;
  for(const id of custSelected){
    const c = CACHE.customers.find(x=>x.id===id); if(!c) continue;
    await api('PUT','/customers/'+id,{...c, status});
  }
  custSelected.clear(); await reloadCustomers(); renderCustTable(); showToast('ЩҲШ¶Ш№ЫҢШӘвҖҢЩҮШ§ ШЁЩҮвҖҢШұЩҲШІ ШҙШҜ');
}
async function bulkCustDelete(){
  if(!custSelected.size) return;
  if(!confirm(`${custSelected.size} Щ…ШҙШӘШұЫҢ ШӯШ°ЩҒ ШҙЩҲШҜШҹ Ш§ЫҢЩҶ Ш№Щ…Щ„ ШЁШұЪҜШҙШӘвҖҢЩҫШ°ЫҢШұ ЩҶЫҢШіШӘ!`)) return;
  for(const id of custSelected) await api('DELETE','/customers/'+id);
  custSelected.clear(); await reloadCustomers(); renderCustTable(); showToast('ШӯШ°ЩҒ ШҙШҜ');
}
async function sendWelcomeSMS(id){
  const c = CACHE.customers.find(x=>x.id===id);

  showToast('ШҜШұ ШӯШ§Щ„ Ш§ШұШіШ§Щ„ ЩҫЫҢШ§Щ…Ъ©...');
  const r = await api('POST','/customers/'+id+'/welcome-sms');
  if(r?.ok) showToast(`вң… ЩҫЫҢШ§Щ…Ъ© Ш®ЩҲШҙвҖҢШўЩ…ШҜЪҜЩҲЫҢЫҢ ШЁЩҮ ${c.biz} Ш§ШұШіШ§Щ„ ШҙШҜ`);

}
async function bulkWelcomeSMS(){
  if(!custSelected.size) return;
  const custs = CACHE.customers.filter(c=>custSelected.has(c.id)&&c.phone);
  if(!custs.length){ showToast('ЩҮЫҢЪҶ Щ…ШҙШӘШұЫҢ Ш§ЩҶШӘШ®Ш§ШЁвҖҢШҙШҜЩҮвҖҢШ§ЫҢ ШҙЩ…Ш§ШұЩҮ Щ…ЩҲШЁШ§ЫҢЩ„ ЩҶШҜШ§ШұШҜ','error'); return; }
  if(!confirm(`ЩҫЫҢШ§Щ…Ъ© Ш®ЩҲШҙвҖҢШўЩ…ШҜЪҜЩҲЫҢЫҢ ШЁШұШ§ЫҢ ${custs.length} Щ…ШҙШӘШұЫҢ Ш§ШұШіШ§Щ„ ШҙЩҲШҜШҹ`)) return;
  let ok=0, fail=0;
  for(const c of custs){
    const r = await api('POST','/customers/'+c.id+'/welcome-sms');
    if(r?.ok) ok++; else fail++;
  }
  showToast(`рҹ“Ө Ш§ШұШіШ§Щ„ ЩҫЫҢШ§Щ…Ъ©: вң… ${ok} Щ…ЩҲЩҒЩӮ${fail?' вҖ” вқҢ '+fail+' ЩҶШ§Щ…ЩҲЩҒЩӮ':''}`);
}

async function saveCust(id){
  const data = {
    biz:el('c-biz').value.trim(), owner:el('c-owner').value,
    province:el('c-province')?.value||'', city:el('c-city')?.value||'',
    address:el('c-address')?.value||'',
    phone:el('c-phone').value, insta:el('c-insta').value, type:el('c-type').value,
    status:el('c-status').value, note:el('c-note').value,
    source:el('c-source')?.value||''
  };
  if(ME.role==='admin'){
    if(el('c-balance')) data.balance = parseFloat(el('c-balance').value)||0;
    if(el('c-assigned_to')) data.assigned_to = +el('c-assigned_to').value||null;
  }
  if(!data.biz){ showToast('ЩҶШ§Щ… ЩҒШұЩҲШҙЪҜШ§ЩҮ Ш§Щ„ШІШ§Щ…ЫҢ Ш§ШіШӘ','error'); return; }
  if(id) await api('PUT','/customers/'+id, data); else await api('POST','/customers', data);
  await reloadCustomers(); closeModal(); renderCustTable(); showToast('Ш°Ш®ЫҢШұЩҮ ШҙШҜ');
};

/* ============================================================

============================================================ */
function importCustomers(){
  const inp=document.createElement('input'); inp.type='file'; inp.accept='.xlsx,.xls';
  inp.onchange=async()=>{
    const fd=new FormData(); fd.append('file',inp.files[0]);
    try{
      const r=await api('POST','/customers/import',fd,true);
      showToast(`${fmt(r.inserted)} Щ…ШҙШӘШұЫҢ Ш§Ш¶Ш§ЩҒЩҮ ШҙШҜ`);
      await reloadCustomers();
      if(CURRENT_PAGE==='customers') renderCustTable();
    }catch(e){}
  };
  inp.click();
}
function downloadCustTemplate(){ downloadAuth('/customers/template','customers-template.xlsx'); }

function setFupView(v){
  fupFilter.view=v;
  const kb=el('btnKanban'),ls=el('btnList');
  if(kb) kb.classList.toggle('ghost',v!=='kanban');
  if(ls) ls.classList.toggle('ghost',v!=='list');
  renderFupView();
}
function filterFups(){
  let rows=CACHE.followups.slice();
  if(fupFilter.q){const q=fupFilter.q.toLowerCase();rows=rows.filter(f=>((f.cust_biz||'')+' '+(f.subject||'')+' '+(f.note||'')+' '+(f.tags||'')).toLowerCase().includes(q));}
  if(fupFilter.status)rows=rows.filter(f=>f.status===fupFilter.status);
  if(fupFilter.stage)rows=rows.filter(f=>(f.pipeline_stage||'lead')===fupFilter.stage);
  return rows;
}
function renderFupView(){ if(fupFilter.view==='kanban') renderFupKanban(); else renderFupTable(); }

function toggleLostReason(){
  const div=el('lostReasonDiv');
  if(div) div.style.display=el('f-stage')?.value==='lost'?'block':'none';
}
async function saveFup(id){
  const cust_id=+el('f-cust').value;
  if(!cust_id){ showToast('Щ…ШҙШӘШұЫҢ ШұШ§ Ш§ЩҶШӘШ®Ш§ШЁ Ъ©ЩҶЫҢШҜ','error'); return; }
  const data={
    cust_id, date:el('f-date').value, type:el('f-type').value,
    priority:el('f-priority').value, subject:el('f-subject').value,
    note:el('f-note').value, action:el('f-action').value,
    next_date:el('f-next').value, next_time:el('f-next-time')?.value||'',
    status:el('f-status').value,
    interest_level:el('f-interest').value,
    purchase_prob:parseInt(el('f-prob').value)||50,
    pipeline_stage:el('f-stage').value,
    tags:el('f-tags').value,
    lost_reason:el('f-lost')?.value||'',
    assigned_to:el('f-assigned')?.value||null
  };
  try{
    if(id) await api('PUT','/followups/'+id,data); else await api('POST','/followups',data);
    CACHE.followups=await api('GET','/followups'); closeModal(); renderFupView(); showToast('Ш°Ш®ЫҢШұЩҮ ШҙШҜ');
  }catch(e){}
}

async function custActivityModal(custId){
  const cust=CACHE.customers.find(x=>x.id===custId)||{biz:'Щ…ШҙШӘШұЫҢ',id:custId};
  openModal(`
    <div class="modal-head"><h3>рҹ“Ӣ ШӘШ§ШұЫҢШ®ЪҶЩҮ вҖ” ${esc(cust.biz)}</h3><button class="x" onclick="closeModal()">Г—</button></div>
    <div class="modal-body" id="activityBody"><div style="text-align:center;padding:24px;color:var(--muted)">ШҜШұ ШӯШ§Щ„ ШЁШ§ШұЪҜШ°Ш§ШұЫҢ...</div></div>
    <div class="modal-foot">
      <button class="btn" onclick="closeModal();fupModal(null,null,${custId})">вһ• ЩҫЫҢЪҜЫҢШұЫҢ Ш¬ШҜЫҢШҜ</button>
      <button class="btn ghost" onclick="closeModal()">ШЁШіШӘЩҶ</button>
    </div>
  `,true);
  try{
    const history=await api('GET','/followups/by-customer/'+custId)||[];
    const body=el('activityBody');
    if(!body) return;
    if(!history.length){ body.innerHTML='<div class="empty">ЩҮЩҶЩҲШІ ЩҫЫҢЪҜЫҢШұЫҢвҖҢШ§ЫҢ Ш«ШЁШӘ ЩҶШҙШҜЩҮ Ш§ШіШӘ.</div>'; return; }
    const typeIcons={'рҹ“ұ ШӘЩ„ЩҒЩҶ':'рҹ“ұ','рҹ’¬ ЩҲШ§ШӘШіШ§Щҫ':'рҹ’¬','рҹ“ё Ш§ЫҢЩҶШіШӘШ§ЪҜШұШ§Щ…':'рҹ“ё','рҹ“І ШӘЩ„ЪҜШұШ§Щ…':'рҹ“І','рҹҸӘ ШӯШ¶ЩҲШұЫҢ':'рҹҸӘ','вңүпёҸ ЩҫЫҢШ§Щ…Ъ©':'вңүпёҸ'};
    body.innerHTML=`<ul class="timeline">${history.map(f=>{
      const stage=PIPELINE_STAGES.find(s=>s.id===(f.pipeline_stage||'lead'))||PIPELINE_STAGES[0];
      const icon=typeIcons[f.type]||'рҹ“һ';
      return `<li class="timeline-item">
        <div class="timeline-dot">${icon}</div>
        <div class="timeline-body">
          <div class="tm-head">
            <span class="tm-type">${esc(f.type||'ШӘЩ…Ш§Ші')}</span>
            <span class="tm-date">${escDate(f.date)}${f.time?' В· '+esc(f.time):''}</span>
          </div>
          ${f.subject?`<div style="font-weight:600;font-size:13px;margin-bottom:4px">${esc(f.subject)}</div>`:''}
          ${f.note?`<div class="tm-text">${esc(f.note)}</div>`:''}
          ${f.action?`<div style="font-size:12px;color:var(--blue);margin-top:4px">вҸӯпёҸ ${esc(f.action)}</div>`:''}
          <div class="tm-meta" style="margin-top:8px">
            <span class="tag ${stage.color}">${stage.icon} ${stage.label}</span>
            ${statusTag(f.priority)}${statusTag(f.status)}
            ${f.purchase_prob?`<span class="tag" style="background:#e0fdf4;color:#065f46">${f.purchase_prob}ЩӘ</span>`:''}
          </div>
          ${f.next_date?`<div style="font-size:11px;color:var(--muted);margin-top:6px">рҹ“… ЩҫЫҢЪҜЫҢШұЫҢ ШЁШ№ШҜЫҢ: ${escDate(f.next_date)}</div>`:''}
        </div>
      </li>`;
    }).join('')}</ul>`;
  }catch(e){ const b=el('activityBody'); if(b)b.innerHTML='<div class="empty">Ш®Ш·Ш§ ШҜШұ ШЁШ§ШұЪҜШ°Ш§ШұЫҢ</div>'; }
}

function renderInvTable(){

  const q=invFilter.q.toLowerCase();
  if(q)rows=rows.filter(i=>((i.num||'')+' '+(i.cust_biz||'')).toLowerCase().includes(q));
  if(invFilter.type)rows=rows.filter(i=>i.type===invFilter.type);
  const isAdmin=ME.role==='admin';
  el('invTable').innerHTML=`<table class="tbl"><thead><tr>
    <th>ШҙЩ…Ш§ШұЩҮ</th><th>Щ…ШҙШӘШұЫҢ</th><th>ЩҶЩҲШ№</th><th>ШӘШ§ШұЫҢШ®</th><th>Щ…ШЁЩ„Шә ЩҶЩҮШ§ЫҢЫҢ</th><th>ЩҒШұЩҲШҙЩҶШҜЩҮ</th><th>Ш№Щ…Щ„ЫҢШ§ШӘ</th>
  </tr></thead><tbody>${rows.map(i=>`<tr>
    <td class="mono" style="font-weight:700">${esc(i.num||'-')}</td><td>${esc(i.cust_biz||'-')}</td>
    <td>${statusTag(i.type)}${i.type==='final'?` <span class="tag ${i.approved?'t-done':'t-pending'}" style="font-size:10px">${i.approved?'вң“ ШӘШЈЫҢЫҢШҜ ШҙШҜЩҮ':'вҸі ШҜШұ Ш§ЩҶШӘШёШ§Шұ'}</span>`:''}</td>
    <td class="mono">${escDate(i.date)}</td><td class="mono">${fmt(i.final)}</td>
    <td class="muted">${esc(i.seller_name||'-')}</td>
    <td>
      ${i.type==='proforma' && !i.converted ? `<button class="btn sm orange" onclick="convertProforma(${i.id})">рҹ”„ ШӘШЁШҜЫҢЩ„ ШЁЩҮ ЩҒШ§Ъ©ШӘЩҲШұ</button>` : ''}
      <button class="btn sm blue" onclick="printInvoice(${i.id})">рҹ–ЁпёҸ</button>
      <button class="btn sm ghost" onclick="openInvBuilder(${i.id})">вңҸпёҸ</button>
      <button class="btn sm red" onclick="confirmDelete('invoices',${i.id},'${esc(i.num||'')}')">рҹ—‘пёҸ</button>
    </td>
  </tr>`).join('')||emptyRow(7)}</tbody></table>`;
}

function renderInvPicker(){
  const words=(el('invProdSearch')?.value||'').trim().toLowerCase().split(/\s+/).filter(Boolean);
  let prods=(CACHE.allProducts.length?CACHE.allProducts:CACHE.products).slice();
  if(words.length) prods=prods.filter(p=>{
    const hay=((p.name||'')+' '+(p.code||'')+' '+(p.category||'')).toLowerCase();
    return words.every(w=>hay.includes(w));
  });
  el('invPicker').innerHTML = prods.map(p=>`
    <div class="pick-card" id="pc-${p.id}" onclick="pickCardTap(event,${p.id})">
      <div class="pimg">${p.image?`<img src="/uploads/products/${esc(p.image)}" loading="lazy" decoding="async">`:'рҹ§Ҙ'}</div>
      <div class="pn">${esc(p.name)}</div>
      <div class="pp">${fmt(p.price)} ШӘ</div>
    </div>`).join('') || '<div class="empty">Щ…ШӯШөЩҲЩ„ЫҢ ЩҶЫҢШіШӘ</div>';
}
function addToCart(pid){
  const p = CACHE.products.find(x=>x.id===pid); if(!p) return;
  const ex = invCart.find(r=>r.product_id===pid);
  const defaultQty = p.pack_size > 1 ? p.pack_size : 1;
  if(ex) ex.qty += defaultQty; else invCart.push({product_id:pid,name:p.name,qty:defaultQty,price:p.price});
  renderCart();
}
let _pickTap={};
function pickCardTap(e,pid){
  const isMobile = window.matchMedia('(hover:none)').matches;
  if(!isMobile){ addToCart(pid); return; }
  const now=Date.now();
  if(_pickTap.id===pid && now-_pickTap.t<400){
    // double-tap confirmed
    addToCart(pid);
    _pickTap={};
    const card=el('pc-'+pid); if(card){card.style.outline='2px solid var(--green)';setTimeout(()=>{card.style.outline='';},500);}
  } else {
    // first tap: highlight, wait for second
    document.querySelectorAll('.pick-card').forEach(c=>c.style.outline='');
    const card=el('pc-'+pid); if(card) card.style.outline='2px solid var(--purple)';
    _pickTap={id:pid,t:now};
  }
}
function renderCart(){
  el('cartRows').innerHTML = invCart.map((r,i)=>`
    <div class="cart-row">
      <span class="cn">${esc(r.name)}</span>
      <input type="number" min="1" value="${r.qty}" onchange="invCart[${i}].qty=Math.max(1,+this.value||1);renderCart()">
      <input class="price-in" type="number" value="${r.price}" onchange="invCart[${i}].price=+this.value||0;renderCart()">
      <button class="rm" onclick="invCart.splice(${i},1);renderCart()">Г—</button>
    </div>`).join('') || '<div class="muted center" style="padding:14px">ШіШЁШҜ Ш®Ш§Щ„ЫҢ Ш§ШіШӘ</div>';
  const subtotal = invCart.reduce((a,r)=>a+r.qty*r.price,0);
  const disc = +(el('inv-disc')?.value||0);
  const discAmt = Math.round(subtotal*disc/100);
  const final = subtotal-discAmt;
  el('cartTot').innerHTML = `
    <div class="l"><span>Ш¬Щ…Ш№ Ъ©Щ„:</span><span class="mono">${fmt(subtotal)} ШӘ</span></div>
    <div class="l"><span>ШӘШ®ЩҒЫҢЩҒ (${fmt(disc)}ЩӘ):</span><span class="mono">${fmt(discAmt)} ШӘ</span></div>
    <div class="l final"><span>ЩҶЩҮШ§ЫҢЫҢ:</span><span class="mono">${fmt(final)} ШӘ</span></div>`;
}
function toggleChequeFields(){
  const pt = el('inv-pay-type')?.value;
  const cf = el('chequeFields');
  if(cf) cf.style.display = pt==='cheque' ? '' : 'none';
}
async function saveInvoice(id){
  const cust_id = +el('inv-cust').value;
  if(!cust_id){ showToast('Щ…ШҙШӘШұЫҢ ШұШ§ Ш§ЩҶШӘШ®Ш§ШЁ Ъ©ЩҶЫҢШҜ','error'); return; }
  if(invCart.length===0){ showToast('ШӯШҜШ§ЩӮЩ„ ЫҢЪ© Щ…ШӯШөЩҲЩ„ Ш§Ш¶Ш§ЩҒЩҮ Ъ©ЩҶЫҢШҜ','error'); return; }
  const pay_type = el('inv-pay-type')?.value || 'cash';
  const data = {
    cust_id, type:el('inv-type').value, date:el('inv-date').value, note:el('inv-note').value,
    disc:+el('inv-disc').value||0,
    pay_type,
    cheque_duration: pay_type==='cheque' ? (el('inv-cheque-dur')?.value||'') : '',
    cheque_due_date: pay_type==='cheque' ? (el('inv-cheque-due')?.value||'') : '',
    cheque_info: pay_type==='cheque' ? (el('inv-cheque-info')?.value||'') : '',
    rows: invCart.map(r=>({product_id:r.product_id, qty:r.qty, price:r.price}))
  };
  try{
    if(id) await api('PUT','/invoices/'+id,data); else await api('POST','/invoices',data);
    CACHE.invoices=await api('GET','/invoices'); closeModal(); renderInvTable(); showToast('ЩҒШ§Ъ©ШӘЩҲШұ Ш°Ш®ЫҢШұЩҮ ШҙШҜ');
  }catch(e){}
}
async function convertProforma(id){
  if(!confirm('ЩҫЫҢШҙвҖҢЩҒШ§Ъ©ШӘЩҲШұ ШЁЩҮ ЩҒШ§Ъ©ШӘЩҲШұ ШұШіЩ…ЫҢ ШӘШЁШҜЫҢЩ„ ШҙЩҲШҜШҹ')) return;
  try{
    await api('POST','/invoices/'+id+'/convert',{});
    CACHE.invoices = await api('GET','/invoices');
    renderInvTable();
    showToast('ШӘШЁШҜЫҢЩ„ ШҙШҜ');
  }catch(e){}
}
async function printInvoice(id, paper){
  if(!paper){
    openModal(`
      <div class="modal-head"><h3>рҹ–ЁпёҸ Ш§ЩҶШӘШ®Ш§ШЁ Ъ©Ш§ШәШ°</h3><button class="x" onclick="closeModal()">Г—</button></div>
      <div class="modal-body" style="padding:24px">
        <p style="margin-bottom:16px;color:var(--muted)">ШіШ§ЫҢШІ Ъ©Ш§ШәШ° ЪҶШ§Щҫ ШұШ§ Ш§ЩҶШӘШ®Ш§ШЁ Ъ©ЩҶЫҢШҜ:</p>
        <div style="display:flex;gap:12px;justify-content:center">
          <button class="btn" style="flex:1;padding:16px;font-size:15px" onclick="closeModal();printInvoice(${id},'A4')">рҹ“„ A4<br><small>ЫІЫұ Г— ЫІЫ№.Ы· ШіШ§ЩҶШӘЫҢвҖҢЩ…ШӘШұ</small></button>
          <button class="btn ghost" style="flex:1;padding:16px;font-size:15px" onclick="closeModal();printInvoice(${id},'A5')">рҹ“„ A5<br><small>ЫұЫҙ.Ыё Г— ЫІЫұ ШіШ§ЩҶШӘЫҢвҖҢЩ…ШӘШұ</small></button>
        </div>
      </div>`);
    return;
  }
  const token = localStorage.getItem('crm_token');
  try{
    const r = await fetch('/api/invoices/'+id+'/print?paper='+paper,{headers:{'Authorization':'Bearer '+token}});
    if(!r.ok){ showToast('Ш®Ш·Ш§ ШҜШұ ШҜШұЫҢШ§ЩҒШӘ ЩҒШ§Ъ©ШӘЩҲШұ','error'); return; }
    const html = await r.text();
    const w = window.open('','_blank');
    w.document.write(html); w.document.close();
  }catch(e){ showToast('Ш®Ш·Ш§ ШҜШұ ЪҶШ§Щҫ','error'); }
}

let prodFilter={category:'',search:'',stock_status:'all'};
let _prodCanEdit = true;
let prodSelected = new Set();
async function loadProductsFiltered(){
  const qs = new URLSearchParams();
  if(prodFilter.category) qs.set('category',prodFilter.category);
  if(prodFilter.search) qs.set('search',prodFilter.search);
  if(prodFilter.stock_status && prodFilter.stock_status!=='all') qs.set('stock_status',prodFilter.stock_status);
  const noFilters = !prodFilter.category && !prodFilter.search && (!prodFilter.stock_status || prodFilter.stock_status==='all');
  CACHE.products = await api('GET','/products?'+qs.toString())||[];
  if(noFilters) CACHE.allProducts = CACHE.products;
}
ROUTES.products = function(){ productsPage(true); };
ROUTES.catalog = function(){ productsPage(false); };

async function productsPage(canEdit){
  _prodCanEdit = canEdit;
  prodSelected.clear();
  el('view').innerHTML='<div class="muted">ШҜШұ ШӯШ§Щ„ ШЁШ§ШұЪҜШ°Ш§ШұЫҢ...</div>';

  await loadProductsFiltered();
  el('view').innerHTML=`
    <div class="toolbar">
      <input class="search" id="pSearch" placeholder="Ш¬ШіШӘШ¬ЩҲ ЩҶШ§Щ… ЫҢШ§ Ъ©ШҜ..." value="${esc(prodFilter.search)}">
      <select id="pCat"><option value="">ЩҮЩ…ЩҮ ШҜШіШӘЩҮвҖҢЩҮШ§</option>
        ${cats.map(c=>`<option value="${esc(c)}" ${prodFilter.category===c?'selected':''}>${esc(c)}</option>`).join('')}</select>
      <select id="pStock">
        <option value="all" ${prodFilter.stock_status==='all'?'selected':''}>ЩҮЩ…ЩҮ Щ…ЩҲШ¬ЩҲШҜЫҢ</option>
        <option value="ok" ${prodFilter.stock_status==='ok'?'selected':''}>Щ…ЩҲШ¬ЩҲШҜ</option>
        <option value="low" ${prodFilter.stock_status==='low'?'selected':''}>Щ…ЩҲШ¬ЩҲШҜЫҢ Ъ©Щ…</option>
      </select>
      ${canEdit?`<button class="btn" onclick="prodModal()">вһ• Щ…ШӯШөЩҲЩ„</button>
        <button class="btn ghost" onclick="importProducts()">рҹ“Ө ЩҲШұЩҲШҜ Ш§Ъ©ШіЩ„</button>
        <button class="btn ghost" onclick="downloadTemplate()">рҹ“„ ЩӮШ§Щ„ШЁ</button>
        <button class="btn ghost" onclick="exportExcel('products')">рҹ“Ҙ Ш®ШұЩҲШ¬ЫҢ</button>`:''}
    </div>
    <div id="pBulkBar" style="display:none;background:var(--purple-light);border-radius:8px;padding:10px 14px;margin-bottom:10px;flex-wrap:wrap;gap:8px;align-items:center">
      <span id="pSelCount" style="font-weight:600;color:var(--purple)">Ы° Щ…ШӯШөЩҲЩ„ Ш§ЩҶШӘШ®Ш§ШЁ ШҙШҜЩҮ</span>
      ${canEdit?`<button class="btn sm red" onclick="bulkProdDelete()">рҹ—‘пёҸ ШӯШ°ЩҒ Ш§ЩҶШӘШ®Ш§ШЁвҖҢШҙШҜЩҮвҖҢЩҮШ§</button>`:''}
      <button class="btn sm ghost" onclick="prodSelected.clear();renderProdGrid(${canEdit})">вң• Щ„ШәЩҲ</button>
    </div>
    <div id="prodGrid" class="pgrid"></div>`;
  el('pSearch').addEventListener('input',()=>{prodFilter.search=el('pSearch').value;debounceProd(canEdit);});
  el('pCat').addEventListener('change',()=>{prodFilter.category=el('pCat').value;refreshProd(canEdit);});
  el('pStock').addEventListener('change',()=>{prodFilter.stock_status=el('pStock').value;refreshProd(canEdit);});
  renderProdGrid(canEdit);
}
let prodTimer;
function debounceProd(canEdit){ clearTimeout(prodTimer); prodTimer=setTimeout(()=>refreshProd(canEdit),300); }
async function refreshProd(canEdit){ await loadProductsFiltered(); renderProdGrid(canEdit); }
async function _refreshProdWithCats(canEdit){
  const [cats] = await Promise.all([api('GET','/products/categories'), loadProductsFiltered()]);
  renderProdGrid(canEdit);
  const pCat=el('pCat');
  if(pCat && cats){
    const prev=pCat.value;
    pCat.innerHTML='<option value="">ЩҮЩ…ЩҮ ШҜШіШӘЩҮвҖҢЩҮШ§</option>'+cats.map(c=>`<option value="${esc(c)}" ${c===prev?'selected':''}>${esc(c)}</option>`).join('');
    pCat.value=prev;
  }
}
function renderProdGrid(canEdit){
  const grid=el('prodGrid'); if(!grid) return;
  const bar=el('pBulkBar'); const cnt=el('pSelCount');
  if(bar) bar.style.display = prodSelected.size>0 ? 'flex' : 'none';
  if(cnt) cnt.textContent = `${prodSelected.size} Щ…ШӯШөЩҲЩ„ Ш§ЩҶШӘШ®Ш§ШЁ ШҙШҜЩҮ`;
  grid.innerHTML = CACHE.products.map(p=>{
    const low = p.stock<=p.stock_alert;
    const sel = prodSelected.has(p.id);
    return `<div class="pcard" style="${sel?'outline:2px solid var(--purple);background:var(--purple-light)':''}">
      <div style="position:absolute;top:8px;right:8px;z-index:2">
        <input type="checkbox" ${sel?'checked':''} onchange="toggleProd(${p.id},this.checked)" style="width:16px;height:16px;cursor:pointer">
      </div>
      <div class="img" ${p.image?`onclick="showImgPreview('/uploads/products/${esc(p.image)}')" style="cursor:zoom-in"`:''}>${p.image?`<img src="/uploads/products/${esc(p.image)}" loading="lazy" decoding="async">`:'рҹ§Ҙ'}</div>
      <div class="body">
        <div class="name">${esc(p.name)}</div>
        <div class="code">${esc(p.code||'')} ${p.category?'В· '+esc(p.category):''}</div>
        <div class="price">${fmt(p.price)} ШӘЩҲЩ…Ш§ЩҶ</div>
        <div class="stock ${low?'low':''}">Щ…ЩҲШ¬ЩҲШҜЫҢ: ${fmt(p.stock)} ${esc(p.unit||'')} ${low?'вҡ пёҸ':''}</div>
        ${(p.colors>1||p.pack_size>1)?`<div style="font-size:11px;color:var(--muted);margin-top:2px">${p.colors>1?`рҹҺЁ ${p.colors} ШұЩҶЪҜ`:''}${p.colors>1&&p.pack_size>1?' В· ':''}${p.pack_size>1?`рҹ“Ұ ${p.pack_size} Ш№ШҜШҜ/ЩҫЪ©`:''}</div>`:''}
        ${canEdit?`<div class="acts">
          <button class="btn sm ghost" onclick="prodModal(${p.id})">вңҸпёҸ</button>
          <button class="btn sm red" onclick="confirmDelete('products',${p.id},'${esc(p.name)}')">рҹ—‘пёҸ</button>
        </div>`:''}
      </div></div>`;
  }).join('') || '<div class="empty">Щ…ШӯШөЩҲЩ„ЫҢ ЫҢШ§ЩҒШӘ ЩҶШҙШҜ</div>';
}
function toggleProd(id, checked){ if(checked) prodSelected.add(id); else prodSelected.delete(id); renderProdGrid(_prodCanEdit); }
async function bulkProdDelete(){
  if(!prodSelected.size) return;
  if(!confirm(`${prodSelected.size} Щ…ШӯШөЩҲЩ„ ШӯШ°ЩҒ ШҙЩҲШҜШҹ Ш§ЫҢЩҶ Ш№Щ…Щ„ ШЁШұЪҜШҙШӘвҖҢЩҫШ°ЫҢШұ ЩҶЫҢШіШӘ!`)) return;
  for(const id of prodSelected) await api('DELETE','/products/'+id);
  prodSelected.clear(); await _refreshProdWithCats(_prodCanEdit); showToast('ШӯШ°ЩҒ ШҙШҜ');
}

async function saveProduct(id){
  const name = el('p-name').value.trim();
  if(!name){ showToast('ЩҶШ§Щ… Щ…ШӯШөЩҲЩ„ Ш§Щ„ШІШ§Щ…ЫҢ Ш§ШіШӘ','error'); return; }
  const fd = new FormData();
  fd.append('name',name);
  fd.append('category',el('p-cat').value.trim());
  fd.append('code',el('p-code').value);
  fd.append('price',el('p-price').value||0);
  fd.append('stock',el('p-stock').value);
  fd.append('stock_alert',el('p-alert').value||5);
  fd.append('unit',el('p-unit').value||'Ш№ШҜШҜ');
  fd.append('colors',el('p-colors')?.value||1);
  fd.append('pack_size',el('p-pack_size')?.value||1);
  fd.append('note',el('p-note').value);
  const f = el('p-image').files[0];
  if(f) fd.append('image',f);
  try{
    if(id) await api('PUT','/products/'+id,fd,true); else await api('POST','/products',fd,true);
    closeModal();
    await _refreshProdWithCats(_prodCanEdit);
    showToast('Ш°Ш®ЫҢШұЩҮ ШҙШҜ');
  }catch(e){ showToast('Ш®Ш·Ш§ ШҜШұ Ш°Ш®ЫҢШұЩҮ Щ…ШӯШөЩҲЩ„','error'); }
}
function importProducts(){
  const inp=document.createElement('input'); inp.type='file'; inp.accept='.xlsx,.xls';
  inp.onchange=async()=>{
    const fd=new FormData(); fd.append('file',inp.files[0]);
    try{ const r=await api('POST','/products/import',fd,true); showToast(`${fmt(r.inserted)} Щ…ШӯШөЩҲЩ„ Ш§Ш¶Ш§ЩҒЩҮ ШҙШҜ`); await refreshProd(true); }catch(e){}
  };
  inp.click();
}
function downloadTemplate(){ downloadAuth('/products/template','products-template.xlsx'); }
function exportExcel(entity){ downloadAuth('/'+entity+'/export/excel', entity+'.xlsx'); }
async function downloadAuth(path,filename){
  const token=localStorage.getItem('crm_token');
  try{
    const r=await fetch('/api'+path,{headers:{'Authorization':'Bearer '+token}});
    if(!r.ok){ showToast('Ш®Ш·Ш§ ШҜШұ ШҜШ§ЩҶЩ„ЩҲШҜ','error'); return; }
    const blob=await r.blob();
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=filename; a.click();
    URL.revokeObjectURL(a.href);
  }catch(e){ showToast('Ш®Ш·Ш§ ШҜШұ ШҜШ§ЩҶЩ„ЩҲШҜ','error'); }
}

let _pendingUserSave = null;
async function saveUser(id){
  const name=el('u-name').value.trim(), username=el('u-username').value.trim(),
        pass=el('u-pass').value, role=el('u-role').value,
        phone=el('u-phone').value, active=+el('u-active').value,
        commission_cash=parseFloat(el('u-comm-cash')?.value||0)||0,
        commission_cheque=parseFloat(el('u-comm-cheque')?.value||0)||0;
  if(!name){ showToast('ЩҶШ§Щ… Ш§Щ„ШІШ§Щ…ЫҢ Ш§ШіШӘ','error'); return; }
  const commInput=el('u-comm-cash');
  const isLocked=commInput?.dataset.locked==='1';
  const origCash=parseFloat(commInput?.dataset.orig||0);
  const origCheque=parseFloat(el('u-comm-cheque')?.dataset.orig||0);
  const rateChanged=id&&(Math.abs(commission_cash-origCash)>0.001||Math.abs(commission_cheque-origCheque)>0.001);
  if(id && isLocked && rateChanged){
    _pendingUserSave={id,name,username,pass,role,phone,active,commission_cash,commission_cheque};
    openModal(`
      <div class="modal-head"><h3>рҹ”’ ШӘШәЫҢЫҢШұ ЩҶШұШ® Ш§ЩҶЪҜЫҢШІЩҮ ЩҒШұЩҲШҙ</h3><button class="x" onclick="closeModal()">Г—</button></div>
      <div class="modal-body">
        <p style="margin-bottom:12px">ЩҶШұШ® Ш§ЩҶЪҜЫҢШІЩҮ ЩҒШұЩҲШҙ <b>${esc(name)}</b> ЩӮЩҒЩ„ Ш§ШіШӘ.</p>
        <p style="margin-bottom:16px;color:var(--muted);font-size:13px">ЩҶЩӮШҜ: ${origCash}ЩӘ вҶҗ ${commission_cash}ЩӘ &nbsp;|&nbsp; ЪҶЪ©: ${origCheque}ЩӘ вҶҗ ${commission_cheque}ЩӘ</p>
        <p>ШўЫҢШ§ Щ…ЫҢвҖҢШ®ЩҲШ§ЩҮЫҢШҜ Щ…ШӯШ§ШіШЁЩҮ Ш§ЩҶЪҜЫҢШІЩҮ ЩҒШұЩҲШҙ ЩҮЩ…ЩҮ ЩҒШ§Ъ©ШӘЩҲШұЩҮШ§ЫҢ ЩӮШЁЩ„ЫҢ Ш§ЫҢЩҶ Ъ©Ш§ШұШҙЩҶШ§Ші ШЁШ§ ЩҶШұШ® Ш¬ШҜЫҢШҜ Щ…Ш¬ШҜШҜШ§ЩӢ Ш§ЩҶШ¬Ш§Щ… ШҙЩҲШҜШҹ</p>
      </div>
      <div class="modal-foot">
        <button class="btn green" onclick="confirmIncentiveChange(true)">ШЁЩ„ЩҮШҢ ЩҮЩ…ЩҮ ЩҒШ§Ъ©ШӘЩҲШұЩҮШ§ Щ…ШӯШ§ШіШЁЩҮ Щ…Ш¬ШҜШҜ ШҙЩҲЩҶШҜ</button>
        <button class="btn ghost" onclick="closeModal()">Ш§ЩҶШөШұШ§ЩҒ (ШЁШҜЩҲЩҶ ШӘШәЫҢЫҢШұ ЩҶШұШ®)</button>
      </div>`);
    return;
  }
  await _doSaveUser(id,{name,username,pass,role,phone,active,commission_cash,commission_cheque});
}
async function confirmIncentiveChange(yes){
  closeModal();
  if(!_pendingUserSave) return;
  const {id,...data}=_pendingUserSave; _pendingUserSave=null;
  if(yes) await _doSaveUser(id,{...data,force:true});
}
async function _doSaveUser(id,{name,username,pass,role,phone,active,commission_cash,commission_cheque,force}){
  try{
    if(id){
      await api('PUT','/admin/users/'+id,{name,role,phone,active,password:pass||undefined,commission_cash,commission_cheque,force:force||undefined});
    } else {
      if(!username||!pass){ showToast('ЩҶШ§Щ… Ъ©Ш§ШұШЁШұЫҢ ЩҲ ШұЩ…ШІ Ш§Щ„ШІШ§Щ…ЫҢ Ш§ШіШӘ','error'); return; }
      await api('POST','/admin/users',{name,username,password:pass,phone,role,commission_cash,commission_cheque});
    }
    CACHE.users=await api('GET','/auth/users'); closeModal(); ROUTES.users(); showToast('Ш°Ш®ЫҢШұЩҮ ШҙШҜ');
  }catch(e){}
}

}

function drawChart(monthly){
  const ctx=el('repChart'); if(!ctx)return;
  if(mChart)mChart.destroy();
  mChart=new Chart(ctx,{type:'bar',data:{
    labels:monthly.map(m=>m.ym),
    datasets:[{label:'ЩҒШұЩҲШҙ (ШӘЩҲЩ…Ш§ЩҶ)',data:monthly.map(m=>m.revenue),backgroundColor:'#7C3AED',borderRadius:6}]
  },options:{responsive:true,plugins:{legend:{labels:{font:{family:'Vazirmatn'}}}},
    scales:{x:{ticks:{font:{family:'Vazirmatn'}}},y:{ticks:{font:{family:'Vazirmatn'},callback:v=>fmt(v)}}}}});
}

let accDateFrom = '', accDateTo = '';

function switchAccTab(tab){
  accTab=tab;
  document.querySelectorAll('[data-acc-tab]').forEach(b=>{
    b.classList.toggle('ghost', b.dataset.accTab!==tab);
  });
  loadAccTab(tab);
}

      }).join('')||emptyRow(7)}</tbody></table></div>`;

    const statusLabel={'pending':'ШҜШұ Ш¬ШұЫҢШ§ЩҶ','received':'ЩҲШөЩҲЩ„ ШҙШҜЩҮ','bounced':'ШЁШұЪҜШҙШӘ Ш®ЩҲШұШҜЩҮ','cancelled':'Ш§ШЁШ·Ш§Щ„'};

async function saveSettlement(){
  const cust_id=+el('st-cust').value, amount=+el('st-amount').value;
  const pay_type=el('st-paytype').value;
  if(!cust_id||!amount){ showToast('Щ…ШҙШӘШұЫҢ ЩҲ Щ…ШЁЩ„Шә Ш§Щ„ШІШ§Щ…ЫҢ Ш§ШіШӘ','error'); return; }
  if(pay_type==='cheque'){
    const bank=el('st-cbank')?.value?.trim(), sayadi=el('st-csayadi')?.value?.trim(), due=el('st-cdue')?.value?.trim();
    if(!bank||!sayadi||!due){ showToast('ШЁШұШ§ЫҢ ЩҫШұШҜШ§Ш®ШӘ ЪҶЪ©ШҢ ЩҶШ§Щ… ШЁШ§ЩҶЪ©ШҢ ШҙЩ…Ш§ШұЩҮ ШөЫҢШ§ШҜЫҢ ЩҲ ШіШұШұШіЫҢШҜ Ш§Щ„ШІШ§Щ…ЫҢ Ш§ШіШӘ','error'); return; }
  }
  try{
    await api('POST','/accounting/settlements',{
      cust_id, amount, pay_type,
      date:el('st-date').value,
      note:el('st-note').value,
      cheque_bank:pay_type==='cheque'?(el('st-cbank')?.value||''):'',
      cheque_sayadi:pay_type==='cheque'?(el('st-csayadi')?.value||''):'',
      cheque_number:pay_type==='cheque'?(el('st-cnum')?.value||''):'',
      cheque_account:pay_type==='cheque'?(el('st-caccnum')?.value||''):'',
      cheque_amount:pay_type==='cheque'?(parseFloat(el('st-camount')?.value||'0')||amount):0,
      cheque_owner:pay_type==='cheque'?(el('st-cowner')?.value||''):'',
      cheque_due:pay_type==='cheque'?(el('st-cdue')?.value||''):'',
      cheque_status:'pending'
    });
    closeModal(); showToast('ШӘШіЩҲЫҢЩҮ Ш«ШЁШӘ ШҙШҜ');
    loadAccTab(accTab);
  }catch(e){}
}

let msgTab='inbox', MSGS=[], msgSearch='';
ROUTES.messages = async function(){
  el('view').innerHTML='<div class="muted">ШҜШұ ШӯШ§Щ„ ШЁШ§ШұЪҜШ°Ш§ШұЫҢ...</div>';
  MSGS=await api('GET','/messages')||[];

  const sent = MSGS.filter(m=>m.direction==='sent');
  const unread = inbox.filter(m=>!m.is_read).length;
  el('view').innerHTML=`
    <div class="msg-tabs" style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:12px">
      <button id="tabInbox" class="btn${msgTab==='inbox'?' green':' ghost'}" onclick="switchMsgTab('inbox')">
        рҹ“Ҙ ШҜШұЫҢШ§ЩҒШӘЫҢ ${unread>0?`<span style="background:#dc2626;color:#fff;border-radius:12px;padding:1px 7px;font-size:11px;margin-right:4px">${unread}</span>`:''}
      </button>
      <button id="tabSent" class="btn${msgTab==='sent'?' green':' ghost'}" onclick="switchMsgTab('sent')">рҹ“Ө Ш§ШұШіШ§Щ„ЫҢ (${sent.length})</button>
      <input id="msgSearchInput" class="search" placeholder="Ш¬ШіШӘШ¬ЩҲ ШҜШұ ЩҫЫҢШ§Щ…вҖҢЩҮШ§..." value="${esc(msgSearch)}" style="flex:1;min-width:140px" oninput="msgSearch=this.value;renderMsgs()">
      <button class="btn ghost" onclick="markAllRead()">вң”пёҸ Ш®ЩҲШ§ЩҶШҜЩҶ ЩҮЩ…ЩҮ</button>
      <button class="btn" onclick="composeMsg()">вңүпёҸ ЩҫЫҢШ§Щ… Ш¬ШҜЫҢШҜ</button>
    </div>
    <div id="msgList"></div>`;
  renderMsgs();
  setTimeout(async()=>{ await api('POST','/messages/read-all'); refreshMsgBadge(); }, 800);
};
function switchMsgTab(t){
  msgTab=t;
  const ib=el('tabInbox'), sn=el('tabSent');
  if(ib){ ib.className=t==='inbox'?'btn green':'btn ghost'; }
  if(sn){ sn.className=t==='sent'?'btn green':'btn ghost'; }
  renderMsgs();
}
function renderMsgs(){
  let list = MSGS.filter(m=> msgTab==='inbox' ? m.direction==='received' : m.direction==='sent');
  if(msgSearch){ const q=msgSearch.toLowerCase(); list=list.filter(m=>(m.body||'').toLowerCase().includes(q)||(m.from_name||'').toLowerCase().includes(q)||(m.to_name||'').toLowerCase().includes(q)); }

async function markVisibleRead(){ setTimeout(async()=>{ await api('POST','/messages/read-all'); refreshMsgBadge(); }, 800); }
async function markAllRead(){ await api('POST','/messages/read-all'); MSGS=await api('GET','/messages'); renderMsgs(); refreshMsgBadge(); showToast('ЩҮЩ…ЩҮ Ш®ЩҲШ§ЩҶШҜЩҮ ШҙШҜ'); }
async function deleteMsg(id){
  if(!confirm('Ш§ЫҢЩҶ ЩҫЫҢШ§Щ… ШӯШ°ЩҒ ШҙЩҲШҜШҹ')) return;
  await api('DELETE','/messages/'+id);
  MSGS=MSGS.filter(m=>m.id!==id); renderMsgs(); showToast('ЩҫЫҢШ§Щ… ШӯШ°ЩҒ ШҙШҜ');
}
async function composeMsg(toId, toName){
  let recipients;
  try{ recipients=await api('GET','/messages/users')||[]; }catch(e){ recipients=[]; }
  const opts = recipients.map(u=>`<option value="${u.id}" ${(toId&&toId===u.id)?'selected':''}>${esc(u.name)}</option>`).join('');
  const broadcastOpt = ME.role==='admin' ? '<option value="">рҹ“ў ЩҮЩ…ЩҮ Ъ©Ш§ШұШЁШұШ§ЩҶ</option>' : '';
  openModal(`
    <div class="modal-head"><h3>вңүпёҸ ЩҫЫҢШ§Щ… Ш¬ШҜЫҢШҜ</h3><button class="x" onclick="closeModal()">Г—</button></div>
    <div class="modal-body"><div class="form-grid">
      <div class="fg full"><label>ЪҜЫҢШұЩҶШҜЩҮ</label><select id="m-to">${broadcastOpt}${opts}</select></div>
      <div class="fg full"><label>Щ…ШӘЩҶ ЩҫЫҢШ§Щ…</label><textarea id="m-body" style="min-height:110px" placeholder="Щ…ШӘЩҶ ЩҫЫҢШ§Щ… Ш®ЩҲШҜ ШұШ§ Ш§ЫҢЩҶШ¬Ш§ ШЁЩҶЩҲЫҢШіЫҢШҜ..."></textarea></div>
    </div></div>
    <div class="modal-foot"><button class="btn green" onclick="sendMsg()">рҹ“Ө Ш§ШұШіШ§Щ„ ЩҫЫҢШ§Щ…</button>
      <button class="btn ghost" onclick="closeModal()">Ш§ЩҶШөШұШ§ЩҒ</button></div>`);
  if(toName && !toId){ /* broadcast default */ }
}
function replyMsg(id, fromName, fromId){
  if(!fromId || fromId===ME.id) return;
  composeMsg(fromId, fromName);
}
async function sendMsg(){
  const toVal = el('m-to').value;
  const to_id = toVal ? +toVal : null;
  const body = el('m-body').value.trim();
  if(!body){ showToast('Щ…ШӘЩҶ ЩҫЫҢШ§Щ… Ш§Щ„ШІШ§Щ…ЫҢ Ш§ШіШӘ','error'); return; }
  try{
    await api('POST','/messages',{to_id,body});
    closeModal(); MSGS=await api('GET','/messages'); renderMsgs(); showToast('ЩҫЫҢШ§Щ… Ш§ШұШіШ§Щ„ ШҙШҜ');
  }catch(e){}
}
async function refreshMsgBadge(){
  try{
    const r=await api('GET','/messages/unread-count');
    const b=el('msgBadge'); if(!b)return;
    if(r.count>0){ b.textContent=fmt(r.count); b.classList.remove('hide'); }
    else b.classList.add('hide');
  }catch(e){}
}

    if(rows.length>0){ b.textContent=rows.length; b.classList.remove('hide'); }

let remFilter = {q:'', done:'0'};
ROUTES.reminders = async function(){
  const rows = await api('GET','/reminders')||[];
  CACHE.reminders = rows;
  const v=el('view');
  v.innerHTML=`
    <div class="toolbar">
      <input class="search" id="remSearch" placeholder="Ш¬ШіШӘШ¬ЩҲЫҢ ЫҢШ§ШҜШўЩҲШұ..." value="${esc(remFilter.q)}">
      <select id="remDone">
        <option value="0" ${remFilter.done==='0'?'selected':''}>ЩҒШ№Ш§Щ„</option>
        <option value="1" ${remFilter.done==='1'?'selected':''}>Ш§ЩҶШ¬Ш§Щ…вҖҢШҙШҜЩҮ</option>
        <option value="" ${remFilter.done===''?'selected':''}>ЩҮЩ…ЩҮ</option>
      </select>
      <button class="btn" onclick="remModal()">вһ• ЫҢШ§ШҜШўЩҲШұ Ш¬ШҜЫҢШҜ</button>
    </div>
    <div class="panel"><div class="panel-body" id="remList"></div></div>`;
  el('remSearch').addEventListener('input',e=>{remFilter.q=e.target.value;renderRemList();});
  el('remDone').addEventListener('change',e=>{remFilter.done=e.target.value;renderRemList();});
  renderRemList();
};
function renderRemList(){
  const body=el('remList'); if(!body) return;
  let rows=(CACHE.reminders||[]).slice();
  if(remFilter.q){ const q=remFilter.q.toLowerCase(); rows=rows.filter(r=>(r.title+' '+(r.body||'')+' '+(r.cust_biz||'')).toLowerCase().includes(q)); }
  if(remFilter.done==='0') rows=rows.filter(r=>!r.done);
  else if(remFilter.done==='1') rows=rows.filter(r=>r.done);
  const today=todayJalali();
  body.innerHTML=rows.length?rows.map(r=>{
    const overdue=!r.done && r.remind_at && r.remind_at<today;
    const isAdmin=ME.role==='admin';
    return `<div class="msg ${overdue?'unread':''}" style="${r.done?'opacity:.55':''}">
      <div class="mh">
        <span>${overdue?'рҹ”ҙ':'рҹ””'} <b>${esc(r.title)}</b>${r.cust_biz?' вҖ” '+esc(r.cust_biz):''}</span>
        <span style="display:flex;gap:6px;align-items:center">
          <span class="mono">${escDate(r.remind_at)}</span>
          ${isAdmin&&r.user_name?`<span class="muted">${esc(r.user_name)}</span>`:''}
          ${!r.done?`<button class="btn sm green" onclick="remDone(${r.id})">вң” Ш§ЩҶШ¬Ш§Щ… ШҙШҜ</button>`:'<span class="tag" style="background:#d1fae5;color:#065f46">вң” Ш§ЩҶШ¬Ш§Щ…</span>'}
          <button class="btn sm ghost" onclick="remModal(${r.id})">вңҸпёҸ</button>
          <button class="btn sm red" onclick="remDelete(${r.id})">рҹ—‘пёҸ</button>
        </span>
      </div>
      ${r.body?`<div class="mb">${esc(r.body)}</div>`:''}
    </div>`;
  }).join(''):'<div class="empty">ЫҢШ§ШҜШўЩҲШұЫҢ ЩҲШ¬ЩҲШҜ ЩҶШҜШ§ШұШҜ</div>';
}
function remModal(id){
  const r=id?(CACHE.reminders||[]).find(x=>x.id===id)||{}:{};
  openModal(`
    <div class="modal-head"><h3>${id?'ЩҲЫҢШұШ§ЫҢШҙ ЫҢШ§ШҜШўЩҲШұ':'ЫҢШ§ШҜШўЩҲШұ Ш¬ШҜЫҢШҜ'}</h3><button class="x" onclick="closeModal()">Г—</button></div>
    <div class="modal-body"><div class="form-grid">
      <div class="fg full"><label>Ш№ЩҶЩҲШ§ЩҶ *</label><input id="rem-title" value="${esc(r.title||'')}"></div>

      <div class="fg full"><label>ШӘЩҲШ¶ЫҢШӯШ§ШӘ</label><textarea id="rem-body">${esc(r.body||'')}</textarea></div>
    </div></div>

async function saveRem(id){
  const title=el('rem-title').value.trim();
  if(!title){showToast('Ш№ЩҶЩҲШ§ЩҶ Ш§Щ„ШІШ§Щ…ЫҢ Ш§ШіШӘ','error');return;}
  const data={title,body:el('rem-body').value,remind_at:el('rem-date').value,cust_id:el('rem-cust').value||null};
  try{
    if(id) await api('PUT','/reminders/'+id,data); else await api('POST','/reminders',data);
    CACHE.reminders=await api('GET','/reminders')||[];
    closeModal(); renderRemList(); showToast('Ш°Ш®ЫҢШұЩҮ ШҙШҜ'); refreshRemBadge();
  }catch(e){showToast('Ш®Ш·Ш§','error');}
}
async function remDone(id){
  await api('PATCH','/reminders/'+id+'/done',{});
  CACHE.reminders=await api('GET','/reminders')||[];
  renderRemList(); refreshRemBadge(); showToast('ЫҢШ§ШҜШўЩҲШұ Ш§ЩҶШ¬Ш§Щ… ШҙШҜ');
}
async function remDelete(id){
  if(!confirm('Ш§ЫҢЩҶ ЫҢШ§ШҜШўЩҲШұ ШӯШ°ЩҒ ШҙЩҲШҜШҹ')) return;
  await api('DELETE','/reminders/'+id);
  CACHE.reminders=(CACHE.reminders||[]).filter(r=>r.id!==id);
  renderRemList(); refreshRemBadge(); showToast('ШӯШ°ЩҒ ШҙШҜ');
}

async function downloadBackup(){
  const st=el('bk-status'); if(st) st.textContent='ШҜШұ ШӯШ§Щ„ ШіШ§Ш®ШӘ ЩҫШҙШӘЫҢШЁШ§ЩҶ...';
  try {
    const token=localStorage.getItem('crm_token');
    const res=await fetch('/api/admin/backup-download',{headers:{'Authorization':'Bearer '+token}});
    if(!res.ok){
      let msg='Ш®Ш·Ш§';
      try{ const j=await res.json(); msg=j.error||msg; }catch{}
      if(st) st.textContent='вқҢ '+msg; return;
    }
    if(st) st.textContent='ШҜШұ ШӯШ§Щ„ ШҜШ§ЩҶЩ„ЩҲШҜ...';
    const blob=await res.blob();
    if(window.showSaveFilePicker){
      try{
        const fh=await window.showSaveFilePicker({
          suggestedName:'crm-latest.tar.gz',
          types:[{description:'ЩҒШ§ЫҢЩ„ ЩҫШҙШӘЫҢШЁШ§ЩҶ',accept:{'application/gzip':['.tar.gz','.gz']}}]
        });
        const w=await fh.createWritable(); await w.write(blob); await w.close();
        if(st) st.textContent='вң… ЩҒШ§ЫҢЩ„ ЩҫШҙШӘЫҢШЁШ§ЩҶ Ш°Ш®ЫҢШұЩҮ ШҙШҜ';
        return;
      }catch(e){ if(e.name==='AbortError'){ if(st) st.textContent=''; return; } }
    }
    // fallback for browsers that don't support showSaveFilePicker
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a'); a.href=url; a.download='crm-latest.tar.gz'; a.click();
    URL.revokeObjectURL(url);
    if(st) st.textContent='вң… ШҜШ§ЩҶЩ„ЩҲШҜ ШҙШұЩҲШ№ ШҙШҜ';
  }catch(e){ if(st) st.textContent='вқҢ '+e.message; }
}
