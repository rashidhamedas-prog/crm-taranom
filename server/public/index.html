        <li>ЫҢШ§ШҜШўЩҲШұ ШІЩҶЪҜ ШІШҜЩҶ ШЁЩҮ ШӘШ§Щ…ЫҢЩҶвҖҢЪ©ЩҶЩҶШҜЩҮ</li>
        <li>ЫҢШ§ШҜШўЩҲШұ ШҙШұЪ©ШӘ ШҜШұ ЩҶЩ…Ш§ЫҢШҙЪҜШ§ЩҮ</li>
        <li>ЫҢШ§ШҜШўЩҲШұ ШӘШ¬ШҜЫҢШҜ ЩӮШұШ§ШұШҜШ§ШҜ</li>
      </ul>
      <p>ЫҢШ§ШҜШўЩҲШұ ЩҫЫҢЪҜЫҢШұЫҢ Щ…ШҙШӘШұЫҢ ШұШ§ Ш§ШІ ШЁШ®Шҙ В«ЩҫЫҢЪҜЫҢШұЫҢвҖҢЩҮШ§В» Ш«ШЁШӘ Ъ©ЩҶЫҢШҜ ШӘШ§ ШЁЩҮ Щ…ШҙШӘШұЫҢ Щ„ЫҢЩҶЪ© ШҙЩҲШҜ.</p>`),
    helpSec('рҹ“Ҡ','ЪҜШІШ§ШұШҙвҖҢЩҮШ§ЫҢ Щ…ЩҶ',`
      <p>ШҜШұ ШҜШ§ШҙШЁЩҲШұШҜШҢ ШўЩ…Ш§Шұ ШҙШ®ШөЫҢ ШҙЩ…Ш§ ЩҶШҙШ§ЩҶ ШҜШ§ШҜЩҮ Щ…ЫҢвҖҢШҙЩҲШҜ:</p><ul>
        <li>ШӘШ№ШҜШ§ШҜ Щ…ШҙШӘШұЫҢШ§ЩҶ ШҙЩ…Ш§</li>
        <li>Щ…Ш¬Щ…ЩҲШ№ ЩҒШұЩҲШҙ (ЩҒШ§Ъ©ШӘЩҲШұЩҮШ§ЫҢ ШұШіЩ…ЫҢ)</li>
        <li>ШӘШ№ШҜШ§ШҜ ЩҫЫҢЪҜЫҢШұЫҢвҖҢЩҮШ§ЫҢ ШЁШ§ШІ</li>
      </ul>
      <div class="tip">ШЁШұШ§ЫҢ ШҜЫҢШҜЩҶ Ш¬ШІШҰЫҢШ§ШӘ ШЁЫҢШҙШӘШұШҢ Ш§ШІ ШЁШ®Шҙ В«ЪҜШІШ§ШұШҙШ§ШӘВ» (ЩҒЩӮШ· Щ…ШҜЫҢШұ) ШҜШұШ®ЩҲШ§ШіШӘ ШҜЩҮЫҢШҜ.</div>`)
  ].join('');
}
function toggleHelpSec(el_){ el_.closest('.help-section').classList.toggle('open'); }

/* ============================================================
   DELETE CONFIRM + CHANGE PASSWORD
============================================================ */
function confirmDelete(entity, id, label){
  openModal(`
    <div class="modal-head"><h3>ШӘШЈЫҢЫҢШҜ ШӯШ°ЩҒ</h3><button class="x" onclick="closeModal()">Г—</button></div>
    <div class="modal-body"><p>ШўЫҢШ§ Ш§ШІ ШӯШ°ЩҒ <b>${esc(label)}</b> Щ…Ш·Щ…ШҰЩҶ ЩҮШіШӘЫҢШҜШҹ Ш§ЫҢЩҶ Ш№Щ…Щ„ ЩӮШ§ШЁЩ„ ШЁШ§ШІЪҜШҙШӘ ЩҶЫҢШіШӘ.</p></div>
    <div class="modal-foot"><button class="btn red" onclick="doDelete('${entity}',${id})">рҹ—‘пёҸ ШӯШ°ЩҒ</button>
      <button class="btn ghost" onclick="closeModal()">Ш§ЩҶШөШұШ§ЩҒ</button></div>`);
}
async function doDelete(entity,id){
  await api('DELETE','/'+entity+'/'+id);
  closeModal(); showToast('ШӯШ°ЩҒ ШҙШҜ');
  // refresh whatever is open
  if(entity==='customers'){ await reloadCustomers(); if(CURRENT_PAGE==='customers')renderCustTable(); }
  else if(entity==='followups'){ CACHE.followups=await api('GET','/followups'); renderFupView(); }
  else if(entity==='invoices'){ CACHE.invoices=await api('GET','/invoices'); renderInvTable(); }
  else if(entity==='products'){ await loadProductsFiltered(); renderProdGrid(true); }
  else if(entity==='admin/users'){ CACHE.users=await api('GET','/auth/users'); ROUTES.users(); }
}
function openChangePass(){
  openModal(`
    <div class="modal-head"><h3>ШӘШәЫҢЫҢШұ ШұЩ…ШІ Ш№ШЁЩҲШұ</h3><button class="x" onclick="closeModal()">Г—</button></div>
    <div class="modal-body"><div class="form-grid">
      <div class="fg full"><label>ШұЩ…ШІ ЩҒШ№Щ„ЫҢ</label><input id="cp-old" type="password"></div>
      <div class="fg full"><label>ШұЩ…ШІ Ш¬ШҜЫҢШҜ</label><input id="cp-new" type="password"></div>
    </div></div>
    <div class="modal-foot"><button class="btn" onclick="doChangePass()">рҹ’ҫ ШӘШәЫҢЫҢШұ</button>
      <button class="btn ghost" onclick="closeModal()">Ш§ЩҶШөШұШ§ЩҒ</button></div>`);
}
async function doChangePass(){
  const oldPass=el('cp-old').value, newPass=el('cp-new').value;
  if(!newPass){ showToast('ШұЩ…ШІ Ш¬ШҜЫҢШҜ Ш§Щ„ШІШ§Щ…ЫҢ Ш§ШіШӘ','error'); return; }
  await api('POST','/auth/change-password',{oldPass,newPass});
  closeModal(); showToast('ШұЩ…ШІ ШӘШәЫҢЫҢШұ Ъ©ШұШҜ');
}

/* ============================================================
   IMAGE LIGHTBOX PREVIEW
============================================================ */
function showImgPreview(src){
  const ov = document.createElement('div');
  ov.className = 'img-overlay';
  ov.innerHTML = `<img src="${src}">`;
  ov.onclick = ()=>ov.remove();
  document.body.appendChild(ov);
}

/* ============================================================
   PWA INSTALL
============================================================ */
let _pwaPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  _pwaPrompt = e;
  if(!localStorage.getItem('pwa_dismissed')) el('installBanner').classList.add('show');
});
function doPWAInstall(){
  if(!_pwaPrompt) return;
  _pwaPrompt.prompt();
  _pwaPrompt.userChoice.then(r=>{ if(r.outcome==='accepted') dismissInstall(); });
}
function dismissInstall(){ el('installBanner').classList.remove('show'); localStorage.setItem('pwa_dismissed','1'); }

/* ============================================================
   CLOCK + SW + INIT
============================================================ */
setInterval(()=>{
  const c=el('clock');
  if(c) c.textContent=_serverNow().toLocaleTimeString('fa-IR',{timeZone:'Asia/Tehran',hour:'2-digit',minute:'2-digit'});
}, 1000);

window.addEventListener('resize', ()=>{ clearTimeout(window._rsz); window._rsz=setTimeout(fitStatNums,120); });
window.addEventListener('DOMContentLoaded', async ()=>{
  if('serviceWorker' in navigator){ try{ navigator.serviceWorker.register('/sw.js'); }catch(e){} }
  // Sync server time first (no auth needed) so all date defaults are accurate
  await syncServerTime();
  const token = localStorage.getItem('crm_token');
  if(token){
    try{ ME = JSON.parse(localStorage.getItem('crm_user')); await boot(); }
    catch(e){ logout(); }
  }
});
</script>
